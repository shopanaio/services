[databases]
* = host=postgres port=5432 user=postgres password=postgres

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Transaction pooling mode - most efficient for microservices
pool_mode = transaction

# Connection pool settings
max_client_conn = 1000
default_pool_size = 25
reserve_pool_size = 5
reserve_pool_timeout = 3

# Server connection settings
server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15

# Logging
admin_users = postgres
stats_users = postgres

# Increase log verbosity for debugging (can be reduced in production)
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
verbose = 0

# Disable DNS lookups for performance
dns_max_ttl = 15
dns_nxdomain_ttl = 15
