[mcp_servers.shopana-cli]
command = "node"
args = ["./packages/shopana-cli-mcp/dist/index.js"]

[mcp_servers.shopana-cli.tools.shopana_admin]
approval_mode = "approve"

[mcp_servers.shopana-index]
command = "npx"
args = ["@zaytra/indexmcp"]

[mcp_servers.antd]
command = "npx"
args = ["-y", "@jzone-mcp/antd-components-mcp"]

[mcp_servers.ag-mcp]
command = "npx"
args = ["ag-mcp"]
