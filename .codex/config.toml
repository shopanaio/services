[mcp_servers.shopana-cli]
command = "node"
args = ["./packages/shopana-cli-mcp/dist/index.js"]

[mcp_servers.shopana-cli.tools.shopana_list_services]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_db_generate]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_codegen]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_schema]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_admin]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_build]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_test]
approval_mode = "approve"

[mcp_servers.shopana-cli.tools.shopana_get_e2e_test_command]
approval_mode = "approve"

[mcp_servers.antd]
approval_mode = "approve"
command = "npx"
args = ["-y", "@jzone-mcp/antd-components-mcp"]

[mcp_servers.ag-mcp]
approval_mode = "approve"
command = "npx"
args = ["ag-mcp"]
