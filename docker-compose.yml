# Shopana Development Environment
# Usage: docker compose up -d

services:
  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:17
    container_name: shopana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Casdoor (Authentication)
  # ============================================
  casdoor:
    image: casbin/casdoor:2.196.1
    container_name: shopana-casdoor
    restart: unless-stopped
    environment:
      RUNNING_IN_DOCKER: "true"
    ports:
      - "9011:9011"
    volumes:
      - ./infra/casdoor/app.conf:/conf/app.conf
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9011/ || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5

  # ============================================
  # MinIO (S3-compatible storage)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: shopana-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: shopana-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/media --ignore-existing;
      mc anonymous set public myminio/media;
      mc mb myminio/inventory --ignore-existing;
      mc anonymous set public myminio/inventory;
      echo 'Buckets created';
      exit 0;
      "
    restart: "no"

  # ============================================
  # RabbitMQ (message broker)
  # ============================================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shopana-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmq
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - ./.data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
