# Shopana Development Environment
# Usage: docker compose up -d

services:
  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:17
    container_name: shopana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_line_prefix=%m [%p] %u@%d"
      - "-c"
      - "logging_collector=off" # Логи идут в stdout
      - "-c"
      - "max_connections=200" # Increased from default 100

  # ============================================
  # MinIO (S3-compatible storage)
  # ============================================
  minio:
    image: minio/minio:latest
    container_name: shopana-minio
    restart: unless-stopped
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: shopana-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/media --ignore-existing;
      mc anonymous set public myminio/media;
      mc mb myminio/inventory --ignore-existing;
      mc anonymous set public myminio/inventory;
      echo 'Buckets created';
      exit 0;
      "
    restart: "no"

  # ============================================
  # Bootstrap (Development)
  # ============================================
  # bootstrap:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.dev
