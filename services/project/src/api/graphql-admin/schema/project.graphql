enum ProjectStatus {
  active
  inactive
}

# WeightUnit, DimensionUnit, CurrencyCode, LocaleCode enums are defined in shared-references

type Project {
  id: ID!
  name: String!
  slug: String!
  status: ProjectStatus!
  timezone: String!
  phoneNumber: String
  email: String
  defaultLocale: LocaleCode!
  defaultCurrency: CurrencyCode!
  defaultWeightUnit: WeightUnit!
  defaultDimensionUnit: DimensionUnit!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type ProjectInfo {
  name: String!
  timezone: String!
  phoneNumber: String
  email: String
  defaultCurrency: CurrencyCode!
  defaultLocale: LocaleCode!
  defaultWeightUnit: WeightUnit!
  defaultDimensionUnit: DimensionUnit!
}

input ProjectCreateInput {
  name: String!
  slug: String!
  locales: [LocaleCode!]!
  defaultCurrency: CurrencyCode!
  status: ProjectStatus
  timezone: String
  phoneNumber: String
  email: String
}

input ProjectUpdateInput {
  name: String
  phoneNumber: String
  email: String
  timezone: String
  defaultWeightUnit: WeightUnit
  defaultDimensionUnit: DimensionUnit
}

input ProjectDeleteInput {
  id: ID!
}

type UserError {
  message: String!
  field: [String!]
  code: String
}

type ProjectCreatePayload {
  project: Project
  userErrors: [UserError!]!
}

type ProjectUpdatePayload {
  project: Project
  userErrors: [UserError!]!
}

type ProjectDeletePayload {
  deletedProjectId: ID
  userErrors: [UserError!]!
}
