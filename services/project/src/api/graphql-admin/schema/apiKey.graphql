type ApiKey {
  id: ID!
  name: String!
  key: String!
  createdAt: DateTime!
  createdById: ID!
  dueDate: DateTime
  lastUsedAt: DateTime
  isBanned: Boolean!
  revokedAt: DateTime
}

input ApiKeyCreateInput {
  name: String!
  dueDate: DateTime
}

input ApiKeyRevokeInput {
  id: ID!
}

input ApiKeyDeleteInput {
  id: ID!
}

type ApiKeyCreatePayload {
  apiKey: ApiKey
  userErrors: [UserError!]!
}

type ApiKeyActionPayload {
  success: Boolean!
  userErrors: [UserError!]!
}

type ApiKeyDeletePayload {
  deletedApiKeyId: ID
  userErrors: [UserError!]!
}
