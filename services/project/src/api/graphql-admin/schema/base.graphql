extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

"""ISO 8601 date-time string"""
scalar DateTime
"""Valid email address"""
scalar Email
"""Unix timestamp in milliseconds"""
scalar Timestamp

extend type Query {
  """Project-related queries"""
  projectQuery: ProjectQuery!
}

extend type Mutation {
  """Project-related mutations"""
  projectMutation: ProjectMutation!
}

"""Queries for project management"""
type ProjectQuery {
  """Get all projects accessible to the current user"""
  projects: [Project!]!

  """Get a project by its unique slug"""
  project(
    """URL-friendly identifier of the project"""
    slug: String!
  ): Project

  """Get all API keys for the current project"""
  apiKeys: [ApiKey!]!
}

"""Mutations for project management"""
type ProjectMutation {
  # Project mutations
  """Create a new project"""
  projectCreate(input: ProjectCreateInput!): ProjectCreatePayload!
  """Update an existing project"""
  projectUpdate(input: ProjectUpdateInput!): ProjectUpdatePayload!
  """Delete a project"""
  projectDelete(input: ProjectDeleteInput!): ProjectDeletePayload!

  # Currency mutations
  """Add a new currency to the project"""
  currencyCreate(input: CurrencyCreateInput!): CurrencyCreatePayload!
  """Remove a currency from the project"""
  currencyDelete(input: CurrencyDeleteInput!): CurrencyDeletePayload!
  """Set the default currency for the project"""
  currencySetDefault(input: CurrencySetDefaultInput!): CurrencyUpdatePayload!

  # Locale mutations
  """Add a new locale to the project"""
  localeCreate(input: LocaleCreateInput!): LocaleCreatePayload!
  """Remove a locale from the project"""
  localeDelete(input: LocaleDeleteInput!): LocaleDeletePayload!
  """Set the default locale for the project"""
  localeSetDefault(input: LocaleSetDefaultInput!): LocaleUpdatePayload!

  # API Key mutations
  """Create a new API key for programmatic access"""
  apiKeyCreate(input: ApiKeyCreateInput!): ApiKeyCreatePayload!
  """Revoke an API key (soft delete)"""
  apiKeyRevoke(input: ApiKeyRevokeInput!): ApiKeyActionPayload!
  """Permanently delete an API key"""
  apiKeyDelete(input: ApiKeyDeleteInput!): ApiKeyDeletePayload!

  # Project Member mutations
  """Change a member's role. Requires project.team:write permission."""
  projectMemberRoleChange(input: ProjectMemberRoleChangeInput!): ProjectMemberRoleChangePayload!
  """Remove a member from the project. Requires project.team:remove permission."""
  projectMemberRemove(input: ProjectMemberRemoveInput!): ProjectMemberRemovePayload!
}
