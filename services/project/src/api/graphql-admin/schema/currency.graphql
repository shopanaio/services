type Currency {
  code: CurrencyCode!
  title: String!
  isActive: Boolean!
  exchangeRate: ExchangeRate!
}

type ExchangeRate {
  amount: Int!
  scale: Int!
}

input CurrencyCreateInput {
  code: CurrencyCode!
  isActive: Boolean!
}

input CurrencyDeleteInput {
  code: CurrencyCode!
}

input CurrencySetDefaultInput {
  currency: CurrencyCode!
}

type CurrencyCreatePayload {
  currency: Currency
  userErrors: [UserError!]!
}

type CurrencyDeletePayload {
  deletedCurrencyCode: CurrencyCode
  userErrors: [UserError!]!
}

type CurrencyUpdatePayload {
  success: Boolean!
  userErrors: [UserError!]!
}
