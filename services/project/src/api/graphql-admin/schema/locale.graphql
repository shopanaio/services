type Locale {
  code: LocaleCode!
  title: String!
  isActive: Boolean!
}

input LocaleCreateInput {
  code: LocaleCode!
  isActive: Boolean!
}

input LocaleDeleteInput {
  code: LocaleCode!
}

input LocaleSetDefaultInput {
  locale: LocaleCode!
}

type LocaleCreatePayload {
  locale: Locale
  userErrors: [UserError!]!
}

type LocaleDeletePayload {
  deletedLocaleCode: LocaleCode
  userErrors: [UserError!]!
}

type LocaleUpdatePayload {
  success: Boolean!
  userErrors: [UserError!]!
}
