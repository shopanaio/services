extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

scalar DateTime
scalar BigInt
scalar JSON
scalar Upload

extend type Query {
  mediaQuery: MediaQuery!
}

extend type Mutation {
  mediaMutation: MediaMutation!
}

type MediaQuery {
  """
  Get a node by its global ID
  """
  node(id: ID!): Node

  """
  Get multiple nodes by their global IDs
  """
  nodes(ids: [ID!]!): [Node]!

  """
  Get a file by ID
  """
  file(
    """
    File ID
    """
    id: ID!
  ): File

  """
  Get files with Relay-style pagination.
  Store context is determined from x-store-name header.
  """
  files(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: FileWhereInput
    """
    Sort order
    """
    orderBy: [FileOrderByInput!]
  ): FileConnection!
}

type MediaMutation {
  # Bucket mutations
  bucketCreate(input: BucketCreateInput!): BucketCreatePayload!

  # File mutations
  fileUpload(input: FileUploadMultipartInput!): FileUploadPayload!
  fileUploadFromUrl(input: FileUploadFromUrlInput!): FileUploadPayload!
  fileCreateExternal(
    input: FileCreateExternalInput!
  ): FileCreateExternalPayload!
  fileUpdate(input: FileUpdateInput!): FileUpdatePayload!
  fileDelete(input: FileDeleteInput!): FileDeletePayload!

  # Avatar/Logo upload
  """
  Upload avatar or logo for an entity (user profile or organization).
  The file is stored in the entity's asset group.
  """
  avatarUpload(input: AvatarUploadInput!): AvatarUploadPayload!

  """
  Delete multiple files by ID.
  """
  fileDeleteMany(input: FileDeleteManyInput!): FileDeleteManyPayload!

  """
  Restore a single deleted file by ID.
  """
  fileRestore(input: FileRestoreInput!): FileRestorePayload!

  """
  Restore multiple deleted files by ID.
  """
  fileRestoreMany(input: FileRestoreManyInput!): FileRestoreManyPayload!

  """
  Clear errors for multiple files by ID.
  """
  fileClearError(input: FileClearErrorInput!): FileClearErrorPayload!
}
