# ============================================================================
# FEDERATION TYPES - Extensions for IAM service types
# ============================================================================

# ---- User Federation ----

"""
User type stub for federation.
"""
type User @key(fields: "id", resolvable: false) {
  id: ID!
}

"""
UserMutation stub for federation extension.
"""
type UserMutation @key(fields: "_", resolvable: false) {
  _: ID!
}

"""
Input for uploading user avatar.
"""
input UserAvatarUploadInput {
  """
  The file to upload.
  """
  file: Upload!

  """
  Alt text for accessibility.
  """
  altText: String
}

"""
Payload for user avatar upload.
"""
type UserAvatarUploadPayload {
  """
  The uploaded file.
  """
  file: File

  """
  The updated user.
  """
  user: User

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

extend type UserMutation {
  """
  Upload avatar for the current user.
  The file is stored in the user's asset group.
  """
  avatarUpload(input: UserAvatarUploadInput!): UserAvatarUploadPayload!
}

# ---- Organization Federation ----

"""
Organization type stub for federation.
"""
type Organization @key(fields: "id", resolvable: false) {
  id: ID!
}

"""
OrganizationMutation stub for federation extension.
"""
type OrganizationMutation @key(fields: "_", resolvable: false) {
  _: ID!
}

"""
Input for uploading organization logo.
"""
input OrganizationLogoUploadInput {
  """
  Organization ID.
  """
  organizationId: ID!

  """
  The file to upload.
  """
  file: Upload!

  """
  Alt text for accessibility.
  """
  altText: String
}

"""
Payload for organization logo upload.
"""
type OrganizationLogoUploadPayload {
  """
  The uploaded file.
  """
  file: File

  """
  The updated organization.
  """
  organization: Organization

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

extend type OrganizationMutation {
  """
  Upload logo for an organization.
  Requires organization membership.
  The file is stored in the organization's asset group.
  """
  logoUpload(input: OrganizationLogoUploadInput!): OrganizationLogoUploadPayload!
}
