# ============================================================================
# ORGANIZATION TYPES
# ============================================================================

"""
Organization - top level entity for multi-tenancy.
Users belong to organizations, organizations contain projects.
"""
type Organization @key(fields: "id") {
  """
  Unique identifier.
  """
  id: ID!

  """
  Organization name (e.g., "Acme Corp").
  """
  name: String!

  """
  URL-friendly unique identifier.
  """
  slug: String!

  """
  All members of this organization.
  """
  members: [OrganizationMember!]!

  """
  All roles defined in this organization.
  """
  roles: [Role!]!

  """
  Available resources for role editor.
  Aggregated from all registered services.
  """
  availableResources: [ResourceDefinition!]!

  """
  Timestamp when the organization was created.
  """
  createdAt: DateTime!

  """
  Timestamp when the organization was last updated.
  """
  updatedAt: DateTime
}

"""
Member of an organization with org-level role and project access.
"""
type OrganizationMember @key(fields: "id") {
  """
  Unique identifier.
  """
  id: ID!

  """
  User reference.
  """
  user: User!

  """
  Organization-level role (owner, admin, member).
  """
  role: String!

  """
  Timestamp when the member joined.
  """
  grantedAt: DateTime!

  """
  Granted by user.
  """
  grantedBy: User!
}

"""
Authentication tokens returned after organization switch.
"""
type AuthPayload {
  """
  JWT access token with organizationId claim.
  """
  accessToken: String!

  """
  Refresh token for obtaining new access tokens.
  """
  refreshToken: String!

  """
  Token expiration time in seconds.
  """
  expiresIn: Int!
}

# ============================================================================
# INPUTS
# ============================================================================

"""
Input for creating an organization.
"""
input CreateOrganizationInput {
  """
  Organization name.
  """
  name: String!

  """
  URL-friendly unique identifier.
  """
  slug: String!
}

"""
Input for inviting a member to organization.
"""
input InviteMemberInput {
  """
  Email address of the user to invite.
  """
  email: Email!

  """
  Organization-level role.
  """
  role: String!

  """
  Optional roles to assign.
  """
  roles: [String!]!
}

"""
Input for updating organization.
"""
input UpdateOrganizationInput {
  """
  New name.
  """
  name: String
}

"""
Input for assigning domain role.
"""
input AssignDomainRoleInput {
  """
  Member ID.
  """
  memberId: ID!

  """
  Domain path (e.g., "project:abc-123" or "*" for all).
  """
  domain: String!

  """
  Role to assign.
  """
  role: String!
}

"""
Input for removing domain access.
"""
input RemoveDomainAccessInput {
  """
  Member ID.
  """
  memberId: ID!

  """
  Domain path to remove access from.
  """
  domain: String!
}

# ============================================================================
# PAYLOADS
# ============================================================================

type CreateOrganizationPayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type UpdateOrganizationPayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type DeleteOrganizationPayload {
  deletedOrganizationId: ID
  userErrors: [GenericUserError!]!
}

type InviteMemberPayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type RemoveMemberPayload {
  removedMemberId: ID
  userErrors: [GenericUserError!]!
}

type AssignDomainRolePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type RemoveDomainAccessPayload {
  member: Member
  userErrors: [GenericUserError!]!
}

# ============================================================================
# QUERIES & MUTATIONS
# ============================================================================

extend type Query {
  """
  Get organization by ID (if user has access).
  """
  organization(id: ID!): Organization

  """
  Get current organization context (resolved from project).
  """
  currentOrganization: Organization
}

extend type Mutation {
  """
  Organization management mutations.
  """
  organizationMutation: OrganizationMutation!
}

"""
Organization mutations.
"""
type OrganizationMutation {
  """
  Create a new organization.
  Current user becomes the owner.
  """
  createOrganization(
    input: CreateOrganizationInput!
  ): CreateOrganizationPayload!

  """
  Update organization.
  Requires: org admin or owner.
  """
  updateOrganization(
    input: UpdateOrganizationInput!
  ): UpdateOrganizationPayload!

  """
  Delete organization.
  Requires: org owner.
  """
  deleteOrganization: DeleteOrganizationPayload!

  """
  Invite member to organization.
  Requires: org admin or owner.
  """
  inviteMember(input: InviteMemberInput!): InviteMemberPayload!

  """
  Remove member from organization.
  Requires: org admin or owner.
  Cannot remove self or owner.
  """
  removeMember(memberId: ID!): RemoveMemberPayload!

  """
  Assign domain role to member.
  Requires: org admin.
  """
  assignDomainRole(input: AssignDomainRoleInput!): AssignDomainRolePayload!

  """
  Remove domain access from member.
  Requires: org admin.
  """
  removeDomainAccess(
    input: RemoveDomainAccessInput!
  ): RemoveDomainAccessPayload!
}
