# ============================================================================
# ORGANIZATION TYPES
# ============================================================================

"""
Organization - top level entity for multi-tenancy.
Users belong to organizations, organizations contain stores.
"""
type Organization @key(fields: "id") {
  """
  Unique identifier.
  """
  id: ID!
  """
  Organization name (e.g., "Acme Corp").
  """
  name: String!
  """
  URL-friendly unique identifier.
  """
  slug: String!
  """
  Membership info (members + roles). Domain = orgId.
  """
  membership: Membership!
  """
  Timestamp when the organization was created.
  """
  createdAt: DateTime!
  """
  Timestamp when the organization was last updated.
  """
  updatedAt: DateTime
}

# ============================================================================
# INPUTS
# ============================================================================

"""
Input for creating an organization.
"""
input OrganizationCreateInput {
  """
  Organization name.
  """
  name: String!
  """
  URL-friendly unique identifier.
  """
  slug: String!
}

"""
Role assignment - assigns role to user in specific domain.
"""
input RoleAssignment {
  """
  Domain ID (orgId, storeId, or '*' for all stores).
  """
  domain: String!
  """
  Role name.
  """
  role: String!
}

"""
Input for inviting a member to organization.
"""
input MemberInviteInput {
  """
  Email address of the user to invite.
  """
  email: Email!
  """
  Role assignments (at least one required).
  """
  roles: [RoleAssignment!]!
}

"""
Input for changing member's role.
"""
input MemberRoleChangeInput {
  """
  User ID.
  """
  userId: ID!
  """
  Domain (orgId, storeId, or '*' for all).
  """
  domain: String!
  """
  New role name.
  """
  role: String!
}

"""
Input for removing member's access.
"""
input MemberAccessRemoveInput {
  """
  User ID.
  """
  userId: ID!
  """
  Domain to remove access from.
  """
  domain: String!
}

"""
Input for updating organization.
"""
input OrganizationUpdateInput {
  """
  New name.
  """
  name: String
}

# ============================================================================
# PAYLOADS
# ============================================================================

type OrganizationCreatePayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type OrganizationUpdatePayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type OrganizationDeletePayload {
  deletedOrganizationId: ID
  userErrors: [GenericUserError!]!
}

type MemberInvitePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type MemberRemovePayload {
  removedMemberId: ID
  userErrors: [GenericUserError!]!
}

type MemberRoleChangePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type MemberAccessRemovePayload {
  success: Boolean!
  userErrors: [GenericUserError!]!
}

# ============================================================================
# QUERIES & MUTATIONS
# ============================================================================

extend type Query {
  """
  Organization queries namespace.
  """
  organizationQuery: OrganizationQuery!
}

"""
Organization queries.
"""
type OrganizationQuery {
  """
  Get organization by ID (if user has access).
  """
  organization(id: ID!): Organization
}

"""
Organization mutations.
"""
type OrganizationMutation {
  """
  Create a new organization.
  Current user becomes the owner.
  """
  organizationCreate(
    input: OrganizationCreateInput!
  ): OrganizationCreatePayload!
  """
  Update organization.
  Requires: org admin or owner.
  """
  organizationUpdate(
    input: OrganizationUpdateInput!
  ): OrganizationUpdatePayload!
  """
  Delete organization. Requires: org owner.
  """
  organizationDelete: OrganizationDeletePayload!
  """
  Invite member to organization with role assignments.
  """
  memberInvite(input: MemberInviteInput!): MemberInvitePayload!
  """
  Remove member from organization.
  Requires: org admin or owner.
  Cannot remove self or owner.
  """
  memberRemove(memberId: ID!): MemberRemovePayload!
  """
  Change role for a member in specific domain.
  """
  memberRoleChange(input: MemberRoleChangeInput!): MemberRoleChangePayload!
  """
  Remove member's access from domain.
  """
  memberAccessRemove(input: MemberAccessRemoveInput!): MemberAccessRemovePayload!
}
