# ============================================================================
# ORGANIZATION TYPES
# ============================================================================

"""
Organization - top level entity for multi-tenancy.
Users belong to organizations, organizations contain stores.
"""
type Organization implements Node @key(fields: "id") {
  """
  Unique identifier.
  """
  id: ID!
  """
  URL-friendly unique identifier.
  """
  name: String!
  """
  Display name (e.g., "Acme Corp").
  """
  displayName: String!
  """
  Membership info (members + roles). Domain = orgId.
  """
  membership: Membership!
  """
  Timestamp when the organization was created.
  """
  createdAt: DateTime!
  """
  Timestamp when the organization was last updated.
  """
  updatedAt: DateTime
}

# ============================================================================
# CONNECTION TYPES
# ============================================================================

"""
A connection to a list of Organization items.
"""
type OrganizationConnection {
  """A list of edges."""
  edges: [OrganizationEdge!]!

  """Information to aid in pagination."""
  pageInfo: PageInfo!

  """The total number of organizations."""
  totalCount: Int!
}

"""
An edge in an Organization connection.
"""
type OrganizationEdge {
  """The item at the end of the edge."""
  node: Organization!

  """A cursor for use in pagination."""
  cursor: String!
}

# ============================================================================
# FILTER TYPES
# ============================================================================

"""Filter conditions for Organization"""
input OrganizationWhereInput {
  """Logical AND of multiple conditions"""
  _and: [OrganizationWhereInput!]
  """Logical OR of multiple conditions"""
  _or: [OrganizationWhereInput!]
  """Negate the condition"""
  _not: OrganizationWhereInput
  """Filter by id"""
  id: IDFilter
  """Filter by name"""
  name: StringFilter
  """Filter by displayName"""
  displayName: StringFilter
  """Filter by createdAt"""
  createdAt: DateTimeFilter
  """Filter by updatedAt"""
  updatedAt: DateTimeFilter
}

"""Fields available for sorting Organization"""
enum OrganizationOrderField {
  """Sort by name"""
  name
  """Sort by displayName"""
  displayName
  """Sort by createdAt"""
  createdAt
  """Sort by updatedAt"""
  updatedAt
}

"""Ordering configuration for Organization"""
input OrganizationOrderByInput {
  """Field to order by"""
  field: OrganizationOrderField!
  """Sort direction"""
  direction: SortDirection!
}

# ============================================================================
# INPUTS
# ============================================================================

"""
Input for creating an organization.
"""
input OrganizationCreateInput {
  """
  URL-friendly unique identifier.
  """
  name: String!
  """
  Display name.
  """
  displayName: String!
}

"""
Role assignment - assigns role to user in specific domain.
"""
input RoleAssignment {
  """
  Domain ID ("org" for organization, or "store:{uuid}").
  """
  domain: String!
  """
  Role name.
  """
  role: String!
}

"""
Input for inviting a member to organization.
"""
input MemberInviteInput {
  """
  Organization ID to invite the member to.
  """
  organizationId: ID!
  """
  Email address of the user to invite.
  """
  email: Email!
  """
  Role assignments (at least one required).
  """
  roles: [RoleAssignment!]!
}

"""
Input for changing member's role.
"""
input MemberRoleChangeInput {
  """
  Organization ID where the member belongs.
  """
  organizationId: ID!
  """
  User ID.
  """
  userId: ID!
  """
  Domain ("org" for organization, or "store:{uuid}").
  """
  domain: String!
  """
  New role name.
  """
  role: String!
}

"""
Input for removing member's access.
"""
input MemberAccessRemoveInput {
  """
  Organization ID where the member belongs.
  """
  organizationId: ID!
  """
  User ID.
  """
  userId: ID!
  """
  Domain to remove access from.
  """
  domain: String!
}

"""
Input for updating organization.
"""
input OrganizationUpdateInput {
  """
  Organization ID.
  """
  id: ID!
  """
  New name (URL-friendly identifier).
  """
  name: String
  """
  New display name.
  """
  displayName: String
}

# ============================================================================
# PAYLOADS
# ============================================================================

type OrganizationCreatePayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type OrganizationUpdatePayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type OrganizationDeletePayload {
  deletedOrganizationId: ID
  userErrors: [GenericUserError!]!
}

type MemberInvitePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type MemberRemovePayload {
  removedMemberId: ID
  userErrors: [GenericUserError!]!
}

type MemberRoleChangePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type MemberAccessRemovePayload {
  success: Boolean!
  userErrors: [GenericUserError!]!
}

"""
Input for transferring organization ownership.
"""
input OwnershipTransferInput {
  """
  Organization ID.
  """
  organizationId: ID!
  """
  User ID of the new owner. Must be an admin of the organization.
  """
  newOwnerId: ID!
}

"""
Input for removing a member from organization.
"""
input MemberRemoveInput {
  """
  Organization ID.
  """
  organizationId: ID!
  """
  User ID of the member to remove.
  """
  userId: ID!
}

type OwnershipTransferPayload {
  """
  Whether the transfer was successful.
  """
  success: Boolean!
  userErrors: [GenericUserError!]!
}
"""
Organization queries.
"""
type OrganizationQuery {
  """
  Get organization by ID or name (if user has access).
  Provide either id or name, not both.
  """
  organization(id: ID, name: String): Organization
  """
  Get all organizations the current user has access to with cursor pagination.
  Returns empty connection if not authenticated.
  """
  organizations(
    """Returns the first n items"""
    first: Int
    """Returns items after this cursor"""
    after: String
    """Returns the last n items"""
    last: Int
    """Returns items before this cursor"""
    before: String
    """Filter conditions"""
    where: OrganizationWhereInput
    """Sort order"""
    orderBy: [OrganizationOrderByInput!]
  ): OrganizationConnection!
}

"""
Organization mutations.
"""
type OrganizationMutation {
  """
  Create a new organization.
  Current user becomes the owner.
  """
  organizationCreate(
    input: OrganizationCreateInput!
  ): OrganizationCreatePayload!
  """
  Update organization.
  Requires: org admin or owner.
  """
  organizationUpdate(
    input: OrganizationUpdateInput!
  ): OrganizationUpdatePayload!
  """
  Delete organization. Requires: org owner only.
  """
  organizationDelete(id: ID!): OrganizationDeletePayload!
  """
  Transfer organization ownership to another admin.
  Only the current owner can transfer ownership.
  New owner must have admin role in the organization.
  Previous owner retains admin role.
  """
  ownershipTransfer(input: OwnershipTransferInput!): OwnershipTransferPayload!
  """
  Invite member to organization with role assignments.
  """
  memberInvite(input: MemberInviteInput!): MemberInvitePayload!
  """
  Remove member from organization.
  Requires: org admin or owner.
  Cannot remove owner (transfer ownership first).
  """
  memberRemove(input: MemberRemoveInput!): MemberRemovePayload!
  """
  Change role for a member in specific domain.
  Owner cannot be demoted.
  """
  memberRoleChange(input: MemberRoleChangeInput!): MemberRoleChangePayload!
  """
  Remove member's access from domain.
  """
  memberAccessRemove(
    input: MemberAccessRemoveInput!
  ): MemberAccessRemovePayload!
}
