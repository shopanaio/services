extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

scalar DateTime
scalar Email
scalar JSON

"""
A generic user error interface for mutation responses.
"""
interface UserError {
  """
  The error message.
  """
  message: String!
  """
  The path to the input field that caused the error.
  """
  field: [String!]
  """
  An error code for programmatic handling.
  """
  code: String
}

"""
A generic user error type for mutation responses.
"""
type GenericUserError implements UserError @shareable {
  message: String!
  field: [String!]
  code: String
}

"""
Authentication tokens.
"""
type AuthToken {
  """
  Access token for API requests.
  """
  accessToken: String!
  """
  Refresh token for obtaining new access tokens.
  """
  refreshToken: String!
  """
  Expiration time in seconds.
  """
  expiresIn: Int!
}

# ---- Admin Users Namespace ----

type UserQuery {
  """
  Get current authenticated admin user
  """
  current: User
}

type UserMutation {
  # Profile
  userUpdateProfile(input: UserUpdateProfileInput!): UserUpdateProfilePayload!
  userUpdateEmail(input: UserUpdateEmailInput!): UserUpdateEmailPayload!
  userUpdatePassword(
    input: UserUpdatePasswordInput!
  ): UserUpdatePasswordPayload!

  # Auth
  signUp(input: UserSignUpInput!): UserSignUpPayload!
  signIn(input: UserSignInInput!): UserSignInPayload!
  signOut(input: UserSignOutInput!): UserSignOutPayload!
  tokenRefresh(input: UserTokenRefreshInput!): UserTokenRefreshPayload!
}
