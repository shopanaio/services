scalar JSON

"""
A generic user error interface for mutation responses.
"""
interface UserError {
  """
  The error message.
  """
  message: String!
  """
  The path to the input field that caused the error.
  """
  field: [String!]
  """
  An error code for programmatic handling.
  """
  code: String
}

"""
A generic user error type for mutation responses.
"""
type GenericUserError implements UserError @shareable {
  message: String!
  field: [String!]
  code: String
}

"""
Authentication tokens.
"""
type AuthTokenPayload {
  """
  Access token for API requests.
  """
  accessToken: String!
  """
  Refresh token for obtaining new access tokens.
  """
  refreshToken: String!
  """
  Expiration time in seconds.
  """
  expiresIn: Int!
}

# ---- Admin Users Namespace ----

type UserQuery {
  """
  Get current authenticated admin user
  """
  current: User

  """
  Get all active sessions for the current user.
  """
  mySessions: [Session!]!

  """
  Check authorization for current user.
  Used for server-side permission checks.
  For client-side checks, use project.roles + user.role.
  """
  authorize(input: AuthorizeInput!): AuthorizePayload!
}

type UserMutation {
  # Profile
  userUpdateProfile(input: UserUpdateProfileInput!): UserUpdateProfilePayload!
  userUpdateEmail(input: UserUpdateEmailInput!): UserUpdateEmailPayload!
  userUpdatePassword(
    input: UserUpdatePasswordInput!
  ): UserUpdatePasswordPayload!

  # Sessions
  """
  Revoke a specific session by ID.
  """
  sessionRevoke(input: SessionRevokeInput!): SessionRevokePayload!
  """
  Revoke all sessions except the current one.
  """
  sessionRevokeAll: SessionRevokeAllPayload!
}

type AuthMutation {
  # Auth
  signUp(input: UserSignUpInput!): UserSignUpPayload!
  signIn(input: UserSignInInput!): UserSignInPayload!
  signOut(input: UserSignOutInput!): UserSignOutPayload!
  tokenRefresh(input: UserTokenRefreshInput!): UserTokenRefreshPayload!
}

"""
Role mutations.
"""
type RoleMutation {
  """
  Create custom role.
  Requires: project:admin permission.
  """
  roleCreate(input: RoleCreateInput!): RoleCreatePayload!
  """
  Update role.
  Requires: project:admin permission.
  System roles cannot be modified.
  """
  roleUpdate(input: RoleUpdateInput!): RoleUpdatePayload!
  """
  Delete custom role.
  Requires: project:admin permission.
  System roles cannot be deleted.
  Roles with assigned users cannot be deleted.
  """
  roleDelete(input: RoleDeleteInput!): RoleDeletePayload!
}

# ============================================================================
# QUERIES & MUTATIONS
# ============================================================================

type Query {
  """
  User management queries.
  """
  userQuery: UserQuery!

  """
  Organization queries namespace.
  """
  organizationQuery: OrganizationQuery!
}

type Mutation {
  """
  User management mutations.
  """
  userMutation: UserMutation!
  """
  Role management mutations.
  """
  roleMutation: RoleMutation!
  """
  Authentication mutations.
  """
  authMutation: AuthMutation!
  """
  Organization management mutations.
  """
  organizationMutation: OrganizationMutation!
}
