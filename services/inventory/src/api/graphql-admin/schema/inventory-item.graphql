# ─────────────────────────────────────────────────────────────────────────────
# InventoryItem - единица учета запасов
# ─────────────────────────────────────────────────────────────────────────────

"""
InventoryItem represents the inventory-specific data for a variant.
Each Variant in Catalog has a corresponding InventoryItem in Inventory service.
"""
type InventoryItem implements Node @key(fields: "id") {
  """Global ID (Relay)"""
  id: ID!

  """Reference to Catalog.Variant"""
  variantId: ID!

  """SKU code"""
  sku: String

  """Whether to track inventory for this item"""
  trackInventory: Boolean!

  """Whether to continue selling when out of stock"""
  continueSellingWhenOutOfStock: Boolean!

  """Physical dimensions (mm)"""
  dimensions: InventoryItemDimensions

  """Weight (grams)"""
  weight: InventoryItemWeight

  """Stock levels across warehouses"""
  stock: [WarehouseStock!]!

  """Total quantity available across all warehouses"""
  totalAvailable: Int!

  """Current unit cost"""
  unitCost: InventoryItemCost

  """When this item was created"""
  createdAt: DateTime!

  """When this item was last updated"""
  updatedAt: DateTime!
}

type InventoryItemDimensions {
  """Width in millimeters"""
  widthMm: Int!
  """Height in millimeters"""
  heightMm: Int!
  """Length in millimeters"""
  lengthMm: Int!
  """Display unit preference"""
  displayUnit: DimensionUnit!
}

enum DimensionUnit {
  MM
  CM
  M
  IN
  FT
  YD
}

type InventoryItemWeight {
  """Weight in grams"""
  weightGrams: Int!
  """Display unit preference"""
  displayUnit: WeightUnit!
}

enum WeightUnit {
  G
  KG
  LB
  OZ
}

type InventoryItemCost {
  """Currency code"""
  currency: String!
  """Cost in minor units (cents)"""
  amountMinor: BigInt!
  """Effective from date"""
  effectiveFrom: DateTime!
}

# ─────────────────────────────────────────────────────────────────────────────
# Federation - Extend Variant from Catalog
# ─────────────────────────────────────────────────────────────────────────────

"""
Extends Variant type from Catalog service with inventory data.
"""
extend type Variant @key(fields: "id") {
  id: ID! @external

  """Inventory item associated with this variant"""
  inventoryItem: InventoryItem
}

# ─────────────────────────────────────────────────────────────────────────────
# Connection types
# ─────────────────────────────────────────────────────────────────────────────

type InventoryItemConnection {
  edges: [InventoryItemEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type InventoryItemEdge {
  node: InventoryItem!
  cursor: String!
}

# ─────────────────────────────────────────────────────────────────────────────
# Input types
# ─────────────────────────────────────────────────────────────────────────────

input InventoryItemWhereInput {
  """Filter by SKU"""
  sku: StringFilter
  """Filter by trackInventory"""
  trackInventory: Boolean
}

input StringFilter {
  _eq: String
  _contains: String
  _startsWith: String
}

input InventoryItemUpdateInput {
  """The inventory item ID to update"""
  id: ID!

  """New SKU value"""
  sku: String

  """Whether to track inventory"""
  trackInventory: Boolean

  """Whether to continue selling when out of stock"""
  continueSellingWhenOutOfStock: Boolean

  """Physical dimensions update"""
  dimensions: InventoryItemDimensionsInput

  """Weight update"""
  weight: InventoryItemWeightInput

  """Stock update for a specific warehouse"""
  stock: InventoryItemStockInput

  """Unit cost update"""
  unitCost: InventoryItemCostInput
}

input InventoryItemDimensionsInput {
  widthMm: Int!
  heightMm: Int!
  lengthMm: Int!
}

input InventoryItemWeightInput {
  weightGrams: Int!
}

input InventoryItemStockInput {
  warehouseId: ID!
  onHand: Int!
  unavailable: Int
}

input InventoryItemCostInput {
  currency: String!
  amountMinor: BigInt!
}

# ─────────────────────────────────────────────────────────────────────────────
# Payload types
# ─────────────────────────────────────────────────────────────────────────────

type InventoryItemUpdatePayload {
  """Updated inventory item"""
  inventoryItem: InventoryItem
  """List of errors"""
  userErrors: [UserError!]!
}

type UserError {
  message: String!
  code: String
  field: [String!]
}
