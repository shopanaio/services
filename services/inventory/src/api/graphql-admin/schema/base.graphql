extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

scalar DateTime
scalar Email
scalar BigInt
scalar JSON

extend type Query {
  inventoryQuery: InventoryQuery!
  widgetQuery: WidgetQuery! @shareable
}

"""
Widget query namespace for dashboard widgets.
Only inventory-related widgets remain in Inventory service.
Pricing widget moved to Catalog service.
"""
type WidgetQuery {
  """
  Get inventory widget data for a product.
  Returns aggregated inventory metrics across all variants.
  """
  inventory(productId: ID!): ProductInventoryWidget
}

extend type Mutation {
  inventoryMutation: InventoryMutation!
}

type InventoryQuery {
  """
  Get a node by its global ID
  """
  node(id: ID!): Node

  """
  Get multiple nodes by their global IDs
  """
  nodes(ids: [ID!]!): [Node]!

  """
  Get a warehouse by ID
  """
  warehouse(id: ID!): Warehouse

  """
  Get all warehouses
  """
  warehouses(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: WarehouseWhereInput
    """
    Sort order
    """
    orderBy: [WarehouseOrderByInput!]
  ): WarehouseConnection!

  """
  Get an inventory item by ID
  """
  inventoryItem(id: ID!): InventoryItem

  """
  Get an inventory item by variant ID
  """
  inventoryItemByVariant(variantId: ID!): InventoryItem

  """
  Get inventory items with Relay-style pagination
  """
  inventoryItems(
    first: Int
    after: String
    where: InventoryItemWhereInput
  ): InventoryItemConnection!
}

type InventoryMutation {
  # InventoryItem mutations (replaces variant inventory mutations)
  """
  Update inventory item: stock, SKU, weight, cost, dimensions.
  Replaces variantUpdateInventory and variantUpdateDimensions.
  """
  inventoryItemUpdate(input: InventoryItemUpdateInput!): InventoryItemUpdatePayload!

  # Warehouse mutations
  warehouseCreate(input: WarehouseCreateInput!): WarehouseCreatePayload!
  warehouseUpdate(input: WarehouseUpdateInput!): WarehouseUpdatePayload!
  warehouseDelete(input: WarehouseDeleteInput!): WarehouseDeletePayload!
}
