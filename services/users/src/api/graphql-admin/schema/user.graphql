# ---- User Types (Admin Users) ----

"""
User type representing admin users (CMS/backoffice).
"""
type User @key(fields: "id") {
  """
  The globally unique ID of the user.
  """
  id: ID!

  """
  User's email address.
  """
  email: Email!

  """
  Whether the email has been verified.
  """
  emailVerified: Boolean!

  """
  User's first name.
  """
  firstName: String

  """
  User's last name.
  """
  lastName: String

  """
  URL to user's avatar image.
  """
  avatar: String

  """
  User's locale/language preference.
  """
  locale: LocaleCode

  """
  Whether the user has admin privileges.
  """
  isAdmin: Boolean!

  """
  Whether the user account is forbidden/banned.
  """
  isForbidden: Boolean!

  """
  Whether the user account is deleted.
  """
  isDeleted: Boolean!

  """
  User's roles.
  """
  roles: [Role!]!

  """
  The date and time when the user was created.
  """
  createdAt: DateTime!

  """
  The date and time when the user was last updated.
  """
  updatedAt: DateTime!
}

"""
Role assigned to a user.
"""
type Role {
  """
  Role owner (organization).
  """
  owner: String!

  """
  Role name/identifier.
  """
  name: String!

  """
  Human-readable display name.
  """
  displayName: String

  """
  Role description.
  """
  description: String

  """
  Whether the role is enabled.
  """
  isEnabled: Boolean!
}

# ---- User Inputs ----

"""
Input for updating user profile.
"""
input UserUpdateProfileInput {
  """
  User's first name.
  """
  firstName: String

  """
  User's last name.
  """
  lastName: String

  """
  User's locale/language preference.
  """
  locale: LocaleCode
}

"""
Payload for user profile update.
"""
type UserUpdateProfilePayload {
  """
  The updated user.
  """
  user: User

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

"""
Input for updating user email.
"""
input UserUpdateEmailInput {
  """
  New email address.
  """
  newEmail: Email!
}

"""
Payload for user email update.
"""
type UserUpdateEmailPayload {
  """
  The updated user.
  """
  user: User

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

# ---- User Auth ----

"""
Input for admin user authentication.
"""
input UserSignInInput {
  """
  Email address.
  """
  email: Email!

  """
  Password.
  """
  password: String!
}

"""
Payload for admin user sign in.
"""
type UserSignInPayload {
  """
  The authenticated user.
  """
  user: User

  """
  Authentication tokens.
  """
  token: AuthToken

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

"""
Input for admin user sign out.
"""
input UserSignOutInput {
  """
  Sign out from all sessions.
  """
  allSessions: Boolean
}

"""
Payload for admin user sign out.
"""
type UserSignOutPayload {
  """
  Whether sign out was successful.
  """
  success: Boolean!

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

"""
Input for refreshing admin user access token.
"""
input UserTokenRefreshInput {
  """
  Refresh token to use for obtaining new access token.
  """
  refreshToken: String!
}

"""
Payload for admin user token refresh.
"""
type UserTokenRefreshPayload {
  """
  New authentication tokens.
  """
  token: AuthToken

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}

"""
Input for updating user password.
"""
input UserUpdatePasswordInput {
  """
  Current password.
  """
  currentPassword: String!

  """
  New password.
  """
  newPassword: String!
}

"""
Payload for user password update.
"""
type UserUpdatePasswordPayload {
  """
  Whether the password was changed successfully.
  """
  success: Boolean!

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}
