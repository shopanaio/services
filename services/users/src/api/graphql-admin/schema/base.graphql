extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

scalar DateTime
scalar Email
scalar JSON

extend type Query {
  userQuery: UserQuery!
  customerQuery: CustomerQuery!
}

extend type Mutation {
  userMutation: UserMutation!
  customerMutation: CustomerMutation!
}

# ---- Admin Users Namespace ----

type UserQuery {
  """
  Get a user by ID
  """
  user(id: ID!): User

  """
  Get current authenticated admin user
  """
  me: User
}

type UserMutation {
  # CRUD
  userCreate(input: UserCreateInput!): UserCreatePayload!
  userUpdate(input: UserUpdateInput!): UserUpdatePayload!
  userDelete(input: UserDeleteInput!): UserDeletePayload!

  # Auth
  signIn(input: UserSignInInput!): UserSignInPayload!
  signOut(input: UserSignOutInput!): UserSignOutPayload!
  tokenRefresh(input: UserTokenRefreshInput!): UserTokenRefreshPayload!
  passwordChange(input: UserPasswordChangeInput!): UserPasswordChangePayload!
}

# ---- Customers Namespace ----

type CustomerQuery {
  """
  Get a customer by ID
  """
  customer(id: ID!): Customer

  """
  Get current authenticated customer
  """
  me: Customer
}

type CustomerMutation {
  # CRUD (admin manages customers)
  customerCreate(input: CustomerCreateInput!): CustomerCreatePayload!
  customerUpdate(input: CustomerUpdateInput!): CustomerUpdatePayload!
  customerDelete(input: CustomerDeleteInput!): CustomerDeletePayload!

  # Auth (customer self-service)
  signUp(input: SignUpInput!): SignUpPayload!
  signIn(input: SignInInput!): SignInPayload!
  signOut(input: SignOutInput!): SignOutPayload!
  tokenRefresh(input: TokenRefreshInput!): TokenRefreshPayload!
  passwordResetRequest(
    input: PasswordResetRequestInput!
  ): PasswordResetRequestPayload!
  passwordReset(input: PasswordResetInput!): PasswordResetPayload!
  passwordChange(input: PasswordChangeInput!): PasswordChangePayload!
  profileUpdate(input: ProfileUpdateInput!): ProfileUpdatePayload!
  emailVerify(input: EmailVerifyInput!): EmailVerifyPayload!
  emailVerifyRequest(
    input: EmailVerifyRequestInput!
  ): EmailVerifyRequestPayload!
}
