extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

scalar DateTime
scalar Email
scalar JSON

extend type Query {
  userQuery: UserQuery!
}

extend type Mutation {
  userMutation: UserMutation!
}

# ---- Admin Users Namespace ----

type UserQuery {
  """
  Get a user by ID
  """
  user(id: ID!): User

  """
  Get current authenticated admin user
  """
  me: User
}

type UserMutation {
  # CRUD
  userCreate(input: UserCreateInput!): UserCreatePayload!
  userUpdate(input: UserUpdateInput!): UserUpdatePayload!
  userDelete(input: UserDeleteInput!): UserDeletePayload!

  # Auth
  signIn(input: UserSignInInput!): UserSignInPayload!
  signOut(input: UserSignOutInput!): UserSignOutPayload!
  tokenRefresh(input: UserTokenRefreshInput!): UserTokenRefreshPayload!
  passwordChange(input: UserPasswordChangeInput!): UserPasswordChangePayload!
}

