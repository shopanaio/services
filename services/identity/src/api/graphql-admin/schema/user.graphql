"""User object from identity provider"""
type User @key(fields: "id") {
  id: ID!
  email: String!
  name: String
  displayName: String
  firstName: String
  lastName: String
  avatar: String
  createdTime: String
  updatedTime: String
}

"""Authentication token"""
type AuthToken {
  accessToken: String!
  refreshToken: String!
  expiresIn: Int!
}

"""Input for user sign in"""
input UserSignInInput {
  email: String!
  password: String!
}

"""Payload returned after sign in"""
type UserSignInPayload {
  user: User
  token: AuthToken
  userErrors: [UserError!]!
}

"""Input for user sign up"""
input UserSignUpInput {
  email: String!
  password: String!
}

"""Payload returned after sign up"""
type UserSignUpPayload {
  user: User
  token: AuthToken
  userErrors: [UserError!]!
}
