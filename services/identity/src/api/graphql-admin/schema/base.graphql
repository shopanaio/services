extend schema
  @link(url: "https://specs.apollo.dev/federation/v2.0", import: ["@key"])

type Query {
  """Get current authenticated user"""
  currentUser: User
}

type Mutation {
  """Sign in a user"""
  userSignIn(input: UserSignInInput!): UserSignInPayload!

  """Sign up a new user"""
  userSignUp(input: UserSignUpInput!): UserSignUpPayload!
}

"""User error returned by mutations"""
type UserError {
  """Human readable error message"""
  message: String!
  """Error code for programmatic handling"""
  code: String
  """Field path if error is related to specific input field"""
  field: [String!]
}
