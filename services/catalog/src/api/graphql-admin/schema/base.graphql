extend schema
  @link(
    url: "https://specs.apollo.dev/federation/v2.7"
    import: [
      "@key"
      "@requires"
      "@provides"
      "@external"
      "@shareable"
      "@override"
      "@inaccessible"
    ]
  )

extend type Query {
  """
  Catalog query namespace for product, variant, category, and collection operations
  """
  catalogQuery: CatalogQuery!

  """
  Widget query namespace for dashboard widgets
  """
  widgetQuery: WidgetQuery! @shareable

  """
  Inventory query namespace for warehouse, stock, and inventory item operations
  """
  inventoryQuery: InventoryQuery!
}

extend type Mutation {
  """
  Catalog mutation namespace for product, variant, category, and collection operations
  """
  catalogMutation: CatalogMutation!

  """
  Inventory mutation namespace for warehouse, stock, and inventory item operations
  """
  inventoryMutation: InventoryMutation!
}

type CatalogQuery {
  """
  Get a node by its global ID
  """
  node(id: ID!): Node

  """
  Get multiple nodes by their global IDs
  """
  nodes(ids: [ID!]!): [Node]!

  """
  Get a product by ID
  """
  product(id: ID!): Product

  """
  Get products with Relay-style pagination
  """
  products(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: ProductWhereInput
    """
    Sort order
    """
    orderBy: [ProductOrderByInput!]
    """
    Additional query metadata and scope filters
    """
    meta: ProductProductsMetaInput
  ): ProductConnection!

  """Get a bundle by Product global ID. The product must have kind = BUNDLE."""
  bundle(id: ID!): Bundle

  """Get bundles with Relay-style pagination."""
  bundles(
    first: Int
    after: String
    last: Int
    before: String
    where: BundleWhereInput
    orderBy: [BundleOrderByInput!]
    meta: BundleBundlesMetaInput
  ): BundleConnection!

  """
  Get a variant by ID
  """
  variant(id: ID!): Variant

  """
  Get variants with Relay-style pagination
  """
  variants(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: VariantWhereInput
    """
    Sort order
    """
    orderBy: [VariantOrderByInput!]
  ): VariantConnection!

  """
  Get a vendor by ID
  """
  vendor(id: ID!): Vendor

  """
  Get vendors with Relay-style pagination
  """
  vendors(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: VendorWhereInput
    """
    Sort order
    """
    orderBy: [VendorOrderByInput!]
  ): VendorConnection!

  """
  Get bulk update job by ID.
  """
  productBulkUpdateJob(jobId: ID!): ProductBulkUpdateJob

  """
  Get product bulk update jobs for the current store.
  Defaults to active jobs when statusFilter is omitted.
  """
  productBulkUpdateJobs(
    first: Int
    after: String
    statusFilter: [BulkUpdateJobStatus!]
  ): ProductBulkUpdateJobConnection!

  """
  Get a category by ID
  """
  category(id: ID!): Category

  """
  Get a collection by ID
  """
  collection(id: ID!): Collection

  """
  Get a collection by its handle
  """
  collectionByHandle(handle: String!): Collection

  """
  Get collections with Relay-style pagination
  """
  collections(first: Int, after: String, last: Int, before: String): CollectionConnection!

  """
  Preview count of products matching collection rules
  """
  collectionRulesPreviewCount(rules: [CollectionRuleInput!]!): Int!

  """
  Get a facet by ID
  """
  facet(id: ID!): Facet

  """
  Get all facets
  """
  facets: [Facet!]!

  """
  Get available facet source candidates for create flow
  """
  facetSourceCandidates(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: FacetSourceCandidateWhereInput
    """
    Sort order
    """
    orderBy: [FacetSourceCandidateOrderByInput!]
  ): FacetSourceCandidateConnection!

  """
  Get available facet source value candidates for create and edit flows
  """
  facetValueCandidates(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: FacetValueCandidateWhereInput
    """
    Sort order
    """
    orderBy: [FacetValueCandidateOrderByInput!]
    """
    Candidate routing and source scope
    """
    meta: FacetValueCandidatesMetaInput!
  ): FacetValueCandidateConnection!

  """
  Get a facet value by ID
  """
  facetValue(id: ID!): FacetValue

  """
  Get all facet values for a specific facet
  """
  facetValues(facetId: ID!): [FacetValue!]!

  """
  Get a facet swatch by ID
  """
  facetSwatch(id: ID!): FacetSwatch

  """
  Get all facet swatches
  """
  facetSwatches: [FacetSwatch!]!

  """
  Get categories with Relay-style pagination
  """
  categories(
    first: Int
    after: String
    last: Int
    before: String
    where: CategoryWhereInput
    orderBy: [CategoryOrderByInput!]
    meta: CategoryCategoriesMetaInput
  ): CategoryConnection!

  """
  Get a tag by ID
  """
  tag(id: ID!): Tag

  """
  Get tags with Relay-style pagination
  """
  tags(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: TagWhereInput
    """
    Sort order
    """
    orderBy: [TagOrderByInput!]
  ): TagConnection!

}

"""
Widget query namespace for dashboard widgets.
"""
type WidgetQuery {
  """
  Get pricing widget data for a variant.
  """
  pricing(input: PricingWidgetInput!): PricingWidgetPayload!

  """
  Get inventory widget data for a product.
  Returns aggregated inventory metrics across all variants.
  """
  inventory(productId: ID!): ProductInventoryWidget
}

type InventoryQuery {
  """
  Get a node by its global ID
  """
  node(id: ID!): Node

  """
  Get multiple nodes by their global IDs
  """
  nodes(ids: [ID!]!): [Node]!

  """
  Get a warehouse by ID
  """
  warehouse(id: ID!): Warehouse

  """
  Get all warehouses
  """
  warehouses(
    first: Int
    after: String
    last: Int
    before: String
    """
    Filter conditions
    """
    where: WarehouseWhereInput
    """
    Sort order
    """
    orderBy: [WarehouseOrderByInput!]
  ): WarehouseConnection!

  """
  Get an inventory item by ID
  """
  inventoryItem(id: ID!): InventoryItem

  """
  Get an inventory item by variant ID
  """
  inventoryItemByVariant(variantId: ID!): InventoryItem

  """
  Get inventory items with Relay-style pagination
  """
  inventoryItems(
    first: Int
    after: String
    last: Int
    before: String
    where: InventoryItemWhereInput
    orderBy: [InventoryItemOrderByInput!]
    meta: InventoryItemInventoryItemsMetaInput
  ): InventoryItemConnection!

  """
  Get variants that can still be assigned to the selected warehouse
  """
  warehouseAssignableVariants(
    warehouseId: ID!
    first: Int
    after: String
    last: Int
    before: String
    where: WarehouseAssignableVariantWhereInput
    orderBy: [WarehouseAssignableVariantOrderByInput!]
  ): VariantConnection!
}

input WarehouseAssignableVariantWhereInput {
  """Logical AND of multiple conditions"""
  _and: [WarehouseAssignableVariantWhereInput!]
  """Logical OR of multiple conditions"""
  _or: [WarehouseAssignableVariantWhereInput!]
  """Negate the condition"""
  _not: WarehouseAssignableVariantWhereInput
  """Filter by variant ID"""
  id: IDFilter
  """Filter by product ID"""
  productId: IDFilter
  """Filter by product name in the current locale"""
  productName: StringFilter
  """Filter by variant SKU"""
  sku: StringFilter
  """Filter by default variant flag"""
  isDefault: BooleanFilter
  """Filter by variant handle"""
  handle: StringFilter
  """Filter by external system"""
  externalSystem: StringFilter
  """Filter by external ID"""
  externalId: StringFilter
  """Filter by creation date"""
  createdAt: DateTimeFilter
  """Filter by update date"""
  updatedAt: DateTimeFilter
}

enum WarehouseAssignableVariantOrderField {
  productName
  sku
  id
  productId
  isDefault
  handle
  externalSystem
  externalId
  createdAt
  updatedAt
}

input WarehouseAssignableVariantOrderByInput {
  field: WarehouseAssignableVariantOrderField!
  direction: SortDirection!
}

type InventoryMutation {
  # InventoryItem mutations
  """
  Update inventory item: stock, SKU, and cost.
  """
  inventoryItemUpdate(input: InventoryItemUpdateInput!): InventoryItemUpdatePayload!

  # Warehouse mutations
  warehouseCreate(input: WarehouseCreateInput!): WarehouseCreatePayload!
  warehouseUpdate(input: WarehouseUpdateInput!): WarehouseUpdatePayload!
  warehouseDelete(input: WarehouseDeleteInput!): WarehouseDeletePayload!

  # Stock mutations
  warehouseStockCreate(input: WarehouseStockCreateInput!): WarehouseStockCreatePayload!
  warehouseStockDelete(input: WarehouseStockDeleteInput!): WarehouseStockDeletePayload!
}

type CatalogMutation {
  # Vendor mutations

  """
  Create a new vendor
  """
  vendorCreate(input: VendorCreateInput!): VendorCreatePayload!

  # Product mutations

  """
  Create a new product
  """
  productCreate(input: ProductCreateInput!): ProductCreatePayload!

  """
  Delete an existing product
  """
  productDelete(input: ProductDeleteInput!): ProductDeletePayload!

  """
  Update product status (active, draft, archived)
  """
  productUpdateStatus(input: ProductUpdateStatusInput!): ProductUpdateStatusPayload!

  """
  Unified product update with optimistic locking.
  Supports product and variant updates in a single request.
  """
  productUpdate(
    """The product ID to update."""
    productId: ID!
    """Expected revision for optimistic locking. If provided, fails if product was modified."""
    expectedRevision: Int
    """Product-level operations."""
    operations: ProductUpdateInput
  ): ProductUpdatePayload!

  """Create a new bundle sellable item."""
  bundleCreate(input: BundleCreateInput!): BundleCreatePayload!

  """Unified bundle update with optimistic locking."""
  bundleUpdate(
    """The bundle ID to update."""
    bundleId: ID!
    """Expected revision for optimistic locking."""
    expectedRevision: Int!
    """Bundle-level operations."""
    operations: BundleUpdateInput
  ): BundleUpdatePayload!

  """Create one bundle configuration."""
  bundleConfigurationCreate(input: BundleConfigurationCreateInput!): BundleConfigurationPayload!

  """Update configuration metadata."""
  bundleConfigurationUpdate(input: BundleConfigurationUpdateInput!): BundleConfigurationPayload!

  """Delete one bundle configuration with optimistic locking."""
  bundleConfigurationDelete(input: BundleConfigurationDeleteInput!): BundleConfigurationDeletePayload!

  """Sync all groups/items for one bundle configuration."""
  bundleGroupsSync(input: BundleGroupsSyncInput!): BundleGroupsSyncPayload!

  """Sync all reusable pricing templates for one bundle configuration."""
  bundlePricingTemplatesSync(input: BundlePricingTemplatesSyncInput!): BundlePricingTemplatesSyncPayload!

  """Sync all dependency rules for one bundle configuration."""
  bundleDependencyRulesSync(input: BundleDependencyRulesSyncInput!): BundleDependencyRulesSyncPayload!

  # Variant mutations

  """
  Create a new variant for a product
  """
  variantCreate(input: VariantCreateInput!): VariantCreatePayload!

  """
  Delete a variant
  """
  variantDelete(input: VariantDeleteInput!): VariantDeletePayload!

  # Variant update mutations

  """
  Update variant pricing information
  """
  variantUpdatePricing(input: VariantUpdatePricingInput!): VariantUpdatePricingPayload!

  """
  Update variant option values
  """
  variantUpdateOptions(input: VariantUpdateOptionsInput!): VariantUpdateOptionsPayload!

  # Option mutations (creates/deletes variants automatically)

  """
  Create a new product option (e.g., Size, Color)
  """
  productOptionCreate(
    input: ProductOptionCreateInput!
  ): ProductOptionCreatePayload!

  """
  Update an existing product option
  """
  productOptionUpdate(
    input: ProductOptionUpdateInput!
  ): ProductOptionUpdatePayload!

  """
  Delete a product option
  """
  productOptionDelete(
    input: ProductOptionDeleteInput!
  ): ProductOptionDeletePayload!
  """
  Sync all product options. This is a complete replace operation.
  Options not in the input list will be deleted.
  Does NOT affect variants - only option definitions are synced.
  """
  productOptionsSync(
    input: ProductOptionsSyncInput!
  ): ProductOptionsSyncPayload!

  # Feature mutations

  """
  Create a new product feature
  """
  productFeatureCreate(
    input: ProductFeatureCreateInput!
  ): ProductFeatureCreatePayload!

  """
  Update an existing product feature
  """
  productFeatureUpdate(
    input: ProductFeatureUpdateInput!
  ): ProductFeatureUpdatePayload!

  """
  Delete a product feature
  """
  productFeatureDelete(
    input: ProductFeatureDeleteInput!
  ): ProductFeatureDeletePayload!

  """
  Sync all product features (complete replace operation)
  """
  productFeaturesSync(
    input: ProductFeaturesSyncInput!
  ): ProductFeaturesSyncPayload!

  # Media mutations

  """
  Update media attachments for a variant
  """
  variantUpdateMedia(input: VariantUpdateMediaInput!): VariantUpdateMediaPayload!

  # Category mutations

  """
  Create a new category
  """
  categoryCreate(input: CategoryCreateInput!): CategoryCreatePayload!

  """
  Unified category update with optimistic locking.
  """
  categoryUpdate(
    categoryId: ID!
    expectedRevision: Int
    operations: CategoryUpdateInput
  ): CategoryUpdatePayload!

  """
  Move a category to a new parent or position
  """
  categoryMove(input: CategoryMoveInput!): CategoryMovePayload!

  """
  Rebalance category tree positions
  """
  categoryRebalance(input: CategoryRebalanceInput!): CategoryRebalancePayload!

  """
  Delete a category
  """
  categoryDelete(input: CategoryDeleteInput!): CategoryDeletePayload!

  """
  Create a new facet
  """
  facetCreate(input: FacetCreateInput!): FacetCreatePayload!

  """
  Update an existing facet
  """
  facetUpdate(input: FacetUpdateInput!): FacetUpdatePayload!

  """
  Delete a facet
  """
  facetDelete(input: FacetDeleteInput!): FacetDeletePayload!

  """
  Move a facet before or after another facet.
  """
  facetMove(input: FacetMoveInput!): FacetMovePayload!

  """
  Rebalance facet lexo ranks.
  """
  facetRebalance(input: FacetRebalanceInput!): FacetRebalancePayload!

  """
  Create a new facet value
  """
  facetValueCreate(input: FacetValueCreateInput!): FacetValueCreatePayload!

  """
  Update an existing facet value
  """
  facetValueUpdate(input: FacetValueUpdateInput!): FacetValueUpdatePayload!

  """
  Attach source facet values to an existing or newly-created display value.
  This is the only mutation that merges source values into a display value.
  """
  facetValueMerge(input: FacetValueMergeInput!): FacetValueMergePayload!

  """
  Detach source facet values from their display value and make them root values.
  This is the only mutation that unmerges source values.
  """
  facetValueUnmerge(input: FacetValueUnmergeInput!): FacetValueUnmergePayload!

  """
  Delete a facet value
  """
  facetValueDelete(input: FacetValueDeleteInput!): FacetValueDeletePayload!

  """
  Create a new facet swatch
  """
  facetSwatchCreate(input: FacetSwatchCreateInput!): FacetSwatchCreatePayload!

  """
  Update an existing facet swatch
  """
  facetSwatchUpdate(input: FacetSwatchUpdateInput!): FacetSwatchUpdatePayload!

  """
  Delete a facet swatch
  """
  facetSwatchDelete(input: FacetSwatchDeleteInput!): FacetSwatchDeletePayload!

  """
  Create a new collection
  """
  collectionCreate(input: CollectionCreateInput!): CollectionCreatePayload!

  """
  Update an existing collection
  """
  collectionUpdate(input: CollectionUpdateInput!): CollectionUpdatePayload!

  """
  Delete a collection
  """
  collectionDelete(input: CollectionDeleteInput!): CollectionDeletePayload!

  """
  Add products to a collection
  """
  collectionAddProducts(input: CollectionAddProductsInput!): CollectionAddProductsPayload!

  """
  Remove products from a collection
  """
  collectionRemoveProducts(input: CollectionRemoveProductsInput!): CollectionRemoveProductsPayload!

  """
  Move a product within a collection
  """
  collectionMoveProduct(input: CollectionMoveProductInput!): CollectionMoveProductPayload!

  """
  Update collection rules for automatic product inclusion
  """
  collectionUpdateRules(input: CollectionUpdateRulesInput!): CollectionUpdateRulesPayload!

  # Tag mutations

  """
  Create a new tag
  """
  tagCreate(input: TagCreateInput!): TagCreatePayload!

  """
  Update an existing tag
  """
  tagUpdate(input: TagUpdateInput!): TagUpdatePayload!

  """
  Delete a tag
  """
  tagDelete(input: TagDeleteInput!): TagDeletePayload!

  # Bulk update mutations
  """
  Start async bulk update.
  Requires X-Idempotency-Key header.
  """
  productBulkUpdate(input: ProductBulkUpdateInput!): ProductBulkUpdatePayload!

}
