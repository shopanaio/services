enum FacetType {
  PRICE
  TAG
  FEATURE
  OPTION
  IN_STOCK
}

enum FacetUIType {
  CHECKBOX
  RADIO
  DROPDOWN
  RANGE
  BOOLEAN
}

enum FacetSelectionMode {
  SINGLE
  MULTI
}

enum FacetValueKind {
  SOURCE
  DISPLAY
}

enum FacetValueEmptyDisplayAction {
  DISABLE
  DELETE
  KEEP
}

type Facet implements Node {
  id: ID!
  facetType: FacetType!
  slug: String!
  label: String!
  uiType: FacetUIType!
  selectionMode: FacetSelectionMode!
  lexoRank: String!
  values: [FacetValue!]!
}

type FacetValue implements Node {
  id: ID!
  facet: Facet!
  parent: FacetValue
  kind: FacetValueKind!
  handle: String!
  label: String!
  sourceValues: [FacetValue!]!
  swatch: FacetSwatch
  sortIndex: Int!
  enabled: Boolean!
}

type FacetSwatch implements Node {
  id: ID!
  swatchType: SwatchType!
  colorOne: String
  colorTwo: String
  file: File
  metadata: JSON
}

input FacetCreateInput {
  facetType: FacetType!
  slug: String!
  uiType: FacetUIType
  selectionMode: FacetSelectionMode
  label: String!
}

input FacetUpdateInput {
  id: ID!
  slug: String
  uiType: FacetUIType
  selectionMode: FacetSelectionMode
  label: String
}

input FacetDeleteInput {
  id: ID!
}

input FacetMoveInput {
  id: ID!
  afterFacetId: ID
  beforeFacetId: ID
}

input FacetRebalanceInput {
  confirm: Boolean = true
}

input FacetValueCreateInput {
  facetId: ID!
  kind: FacetValueKind = DISPLAY
  handle: String!
  label: String!
  sourceValueIds: [ID!]
  swatchId: ID
  sortIndex: Int
  enabled: Boolean
}

input FacetValueUpdateInput {
  id: ID!
  handle: String
  label: String
  swatchId: ID
  sortIndex: Int
  enabled: Boolean
}

input FacetValueMergeInput {
  facetId: ID!
  targetDisplayValueId: ID
  targetHandle: String
  targetLabel: String
  sourceValueIds: [ID!]!
}

input FacetValueUnmergeInput {
  sourceValueIds: [ID!]!
  emptyDisplayAction: FacetValueEmptyDisplayAction = DISABLE
}

input FacetValueDeleteInput {
  id: ID!
}

input FacetSwatchCreateInput {
  swatchType: SwatchType!
  colorOne: String
  colorTwo: String
  fileId: ID
  metadata: JSON
}

input FacetSwatchUpdateInput {
  id: ID!
  swatchType: SwatchType
  colorOne: String
  colorTwo: String
  fileId: ID
  metadata: JSON
}

input FacetSwatchDeleteInput {
  id: ID!
}

type FacetCreatePayload {
  facet: Facet
  userErrors: [GenericUserError!]!
}

type FacetUpdatePayload {
  facet: Facet
  userErrors: [GenericUserError!]!
}

type FacetDeletePayload {
  deletedFacetId: ID
  userErrors: [GenericUserError!]!
}

type FacetMovePayload {
  facet: Facet
  userErrors: [GenericUserError!]!
}

type FacetRebalancePayload {
  facets: [Facet!]!
  userErrors: [GenericUserError!]!
}

type FacetValueCreatePayload {
  facetValue: FacetValue
  userErrors: [GenericUserError!]!
}

type FacetValueUpdatePayload {
  facetValue: FacetValue
  userErrors: [GenericUserError!]!
}

type FacetValueMergePayload {
  facetValue: FacetValue
  sourceValues: [FacetValue!]!
  userErrors: [GenericUserError!]!
}

type FacetValueUnmergePayload {
  sourceValues: [FacetValue!]!
  affectedDisplayValues: [FacetValue!]!
  userErrors: [GenericUserError!]!
}

type FacetValueDeletePayload {
  deletedFacetValueId: ID
  userErrors: [GenericUserError!]!
}

type FacetSwatchCreatePayload {
  facetSwatch: FacetSwatch
  userErrors: [GenericUserError!]!
}

type FacetSwatchUpdatePayload {
  facetSwatch: FacetSwatch
  userErrors: [GenericUserError!]!
}

type FacetSwatchDeletePayload {
  deletedFacetSwatchId: ID
  userErrors: [GenericUserError!]!
}
