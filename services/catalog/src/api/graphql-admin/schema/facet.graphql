enum FacetType {
  PRICE
  TAG
  FEATURE
  OPTION
  IN_STOCK
}

enum FacetUIType {
  CHECKBOX
  RADIO
  DROPDOWN
  RANGE
  BOOLEAN
}

enum FacetSelectionMode {
  SINGLE
  MULTI
}

type Facet implements Node {
  id: ID!
  facetType: FacetType!
  sources: [FacetSource!]!
  slug: String!
  label: String!
  uiType: FacetUIType!
  selectionMode: FacetSelectionMode!
  lexoRank: String!
  values: [FacetValue!]!
}

type FacetSource {
  handle: String!
  name: String!
}

type FacetValue implements Node {
  id: ID!
  facet: Facet!
  slug: String!
  label: String!
  sourceHandles: [String!]!
  swatch: FacetSwatch
  sortIndex: Int!
  enabled: Boolean!
}

type FacetSwatch implements Node {
  id: ID!
  swatchType: SwatchType!
  colorOne: String
  colorTwo: String
  file: File
  metadata: JSON
}

input FacetCreateInput {
  facetType: FacetType!
  slug: String!
  sources: [FacetSourceInput!]
  uiType: FacetUIType
  selectionMode: FacetSelectionMode
  label: String!
}

input FacetUpdateInput {
  id: ID!
  slug: String
  sources: [FacetSourceInput!]
  uiType: FacetUIType
  selectionMode: FacetSelectionMode
  label: String
}

input FacetSourceInput {
  handle: String!
  name: String!
}

input FacetDeleteInput {
  id: ID!
}

input FacetMoveInput {
  id: ID!
  afterFacetId: ID
  beforeFacetId: ID
}

input FacetRebalanceInput {
  confirm: Boolean = true
}

input FacetValueCreateInput {
  facetId: ID!
  slug: String!
  label: String!
  sourceHandles: [String!]
  swatchId: ID
  sortIndex: Int
  enabled: Boolean
}

input FacetValueUpdateInput {
  id: ID!
  slug: String
  label: String
  sourceHandles: [String!]
  swatchId: ID
  sortIndex: Int
  enabled: Boolean
}

input FacetValueDeleteInput {
  id: ID!
}

input FacetSwatchCreateInput {
  swatchType: SwatchType!
  colorOne: String
  colorTwo: String
  fileId: ID
  metadata: JSON
}

input FacetSwatchUpdateInput {
  id: ID!
  swatchType: SwatchType
  colorOne: String
  colorTwo: String
  fileId: ID
  metadata: JSON
}

input FacetSwatchDeleteInput {
  id: ID!
}

type FacetCreatePayload {
  facet: Facet
  userErrors: [GenericUserError!]!
}

type FacetUpdatePayload {
  facet: Facet
  userErrors: [GenericUserError!]!
}

type FacetDeletePayload {
  deletedFacetId: ID
  userErrors: [GenericUserError!]!
}

type FacetMovePayload {
  facet: Facet
  userErrors: [GenericUserError!]!
}

type FacetRebalancePayload {
  facets: [Facet!]!
  userErrors: [GenericUserError!]!
}

type FacetValueCreatePayload {
  facetValue: FacetValue
  userErrors: [GenericUserError!]!
}

type FacetValueUpdatePayload {
  facetValue: FacetValue
  userErrors: [GenericUserError!]!
}

type FacetValueDeletePayload {
  deletedFacetValueId: ID
  userErrors: [GenericUserError!]!
}

type FacetSwatchCreatePayload {
  facetSwatch: FacetSwatch
  userErrors: [GenericUserError!]!
}

type FacetSwatchUpdatePayload {
  facetSwatch: FacetSwatch
  userErrors: [GenericUserError!]!
}

type FacetSwatchDeletePayload {
  deletedFacetSwatchId: ID
  userErrors: [GenericUserError!]!
}
