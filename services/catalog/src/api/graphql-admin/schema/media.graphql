# ---- Media Types ----

# A file reference from the Media service (federated entity).
extend type File @key(fields: "id", resolvable: false) {
  id: ID! @external
}

"""
Media attached to a variant with sort order.
"""
type VariantMediaItem {
  """
  The file from the Media service.
  """
  file: File!

  """
  Sort order index (lower = first).
  """
  sortIndex: Int!
}

# ---- Media Mutation Inputs ----

"""
Input for updating variant media (replaces all existing media).
"""
input VariantUpdateMediaInput {
  """
  The variant ID.
  """
  variantId: ID!

  """
  File IDs in desired order (first = primary). Empty array clears all media.
  """
  fileIds: [ID!]!
}

"""
Payload for variant update media.
"""
type VariantUpdateMediaPayload {
  """
  The updated variant.
  """
  variant: Variant

  """
  List of errors that occurred during the mutation.
  """
  userErrors: [GenericUserError!]!
}
