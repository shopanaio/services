# ---- Listing Types ----

interface Listing implements Node {
  """The Product global ID of the catalog listing item."""
  id: ID!

  """Product discriminator."""
  kind: ProductKind!

  """The URL-friendly handle."""
  handle: String

  """Localized title."""
  title: String!

  """Media registered on this listing item."""
  media: [ProductMediaItem!]!

  """The primary category assigned to this listing item."""
  primaryCategory: Category

  """The tags associated with this listing item."""
  tags: [Tag!]!

  """The total number of variants."""
  variantsCount: Int!
}

"""A connection to a mixed list of catalog listing items."""
type ListingConnection {
  """A list of edges."""
  edges: [ListingEdge!]!

  """Information to aid in pagination."""
  pageInfo: PageInfo!

  """The total number of catalog listing items."""
  totalCount: Int!
}

"""An edge in a Listing connection."""
type ListingEdge {
  """The item at the end of the edge."""
  node: Listing!

  """A cursor for use in pagination."""
  cursor: String!
}

input ListingWhereInput {
  _and: [ListingWhereInput!]
  _or: [ListingWhereInput!]
  _not: ListingWhereInput
  id: IDFilter
  kind: StringFilter
  vendorId: IDFilter
  handle: StringFilter
  publishedAt: DateTimeFilter
  createdAt: DateTimeFilter
  updatedAt: DateTimeFilter
  locale: StringFilter
  name: StringFilter
  currency: StringFilter
  minPriceMinor: IntFilter
  maxPriceMinor: IntFilter
  primaryCategoryId: IDFilter
  primaryCategoryName: StringFilter
  brandName: StringFilter
}

enum ListingOrderField {
  id
  kind
  vendorId
  handle
  publishedAt
  createdAt
  updatedAt
  locale
  name
  currency
  minPriceMinor
  maxPriceMinor
  primaryCategoryId
  primaryCategoryName
  brandName
}

input ListingOrderByInput {
  field: ListingOrderField!
  direction: SortDirection!
}
