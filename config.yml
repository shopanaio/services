# ═══════════════════════════════════════════════════════════════════
# GLOBAL SETTINGS
# ═══════════════════════════════════════════════════════════════════
global:
  environment: development # development | staging | production
  log_level: debug # debug | info | warn | error

# ═══════════════════════════════════════════════════════════════════
# SHARED RESOURCES (YAML anchors for DRY)
# ═══════════════════════════════════════════════════════════════════
shared:
  db:
    default: &db_default
      host: localhost
      port: 5432
      user: postgres
      password: postgres
      database: portal
      schema: portal

  s3:
    default: &s3_default
      endpoint: http://localhost:9000
      access_key: minioadmin
      secret_key: minioadmin
      region: us-east-1
      path_style: true

# ═══════════════════════════════════════════════════════════════════
# FEDERATION (GraphQL Gateway)
# ═══════════════════════════════════════════════════════════════════
federation:
  admin:
    port: 4001
  storefront:
    port: 4000

# ═══════════════════════════════════════════════════════════════════
# SERVICES
# ═══════════════════════════════════════════════════════════════════
services:
  apps:
    ports:
      admin_graphql: 10001
      metrics: 3033
    db:
      <<: *db_default

  checkout:
    ports:
      storefront_graphql: 10002
      metrics: 3031
    db:
      <<: *db_default

  delivery: {}

  inventory:
    ports:
      admin_graphql: 10005
      metrics: 3034
    db:
      <<: *db_default
      schema: null
    s3:
      <<: *s3_default
      bucket: inventory

  media:
    ports:
      admin_graphql: 10007
      metrics: 3035
    db:
      <<: *db_default
    s3:
      <<: *s3_default
      bucket: media

  orders:
    ports:
      admin_graphql: 10004
      storefront_graphql: 10003
      metrics: 3032
    db:
      <<: *db_default

  payments: {}

  pricing: {}

  project:
    ports:
      admin_graphql: 10009
      metrics: 3036
    db:
      <<: *db_default

  users:
    ports:
      admin_graphql: 10010
      metrics: 3037
    casdoor:
      endpoint: ${CASDOOR_ENDPOINT}
      client_id: ${CASDOOR_CLIENT_ID}
      client_secret: ${CASDOOR_CLIENT_SECRET}
      application_name: ${CASDOOR_APPLICATION_NAME}
      organization_name: ${CASDOOR_ORGANIZATION_NAME}
      certificate: ${CASDOOR_CERTIFICATE}
      google_provider: ${CASDOOR_GOOGLE_PROVIDER}
      oauth_redirect_uri: ${CASDOOR_OAUTH_REDIRECT_URI}
