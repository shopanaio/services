query OrganizationMembership($id: ID!) {
  organizationQuery {
    organization(id: $id) {
      id
      name
      membership {
        domain
        roles {
          id
          domain
          name
          displayName
          description
          isSystem
          permissions {
            resource
            actions
          }
          createdAt
        }
        members {
          id
          user {
            id
            email
            firstName
            lastName
          }
          role
          isOwner
          grantedAt
          grantedBy {
            id
            email
          }
        }
        availableResources {
          name
          actions
          displayName
        }
      }
    }
  }
}
