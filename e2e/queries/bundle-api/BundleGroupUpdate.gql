mutation BundleGroupUpdate($input: BundleGroupsSyncInput!) {
  catalogMutation {
    bundleGroupsSync(input: $input) {
      groups {
        id
        title
        sortIndex
        minSelection
        maxSelection
        items {
          id
          groupId
          itemType
          sortIndex
        }
        createdAt
        updatedAt
      }
      userErrors {
        message
        code
        field
      }
    }
  }
}
