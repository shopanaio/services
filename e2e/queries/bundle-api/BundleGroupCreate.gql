mutation BundleGroupCreate($input: BundleGroupCreateInput!) {
  catalogMutation {
    bundleGroupCreate(input: $input) {
      bundleGroup {
        id
        productId
        title
        sortIndex
        minSelection
        maxSelection
        items {
          id
          groupId
          itemType
          sortIndex
        }
        createdAt
        updatedAt
      }
      userErrors {
        message
        code
        field
      }
    }
  }
}
