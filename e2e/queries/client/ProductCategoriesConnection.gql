query ProductCategoriesConnection(
  $handle: String!
  $first: Int
  $after: Cursor
  $last: Int
  $before: Cursor
  $sort: CategorySort
) {
  product(handle: $handle) {
    categories(first: $first, after: $after, last: $last, before: $before, sort: $sort) {
      edges {
        cursor
        node {
          id
          title
          handle
          createdAt
          updatedAt
        }
      }
      pageInfo {
        hasNextPage
        hasPreviousPage
        startCursor
        endCursor
      }
      totalCount
    }
  }
}
