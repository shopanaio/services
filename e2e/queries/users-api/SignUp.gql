mutation SignUp($input: UserSignUpInput!) {
  userMutation {
    signUp(input: $input) {
      user {
        id
        email
        emailVerified
        firstName
        lastName
        isAdmin
        organizationId
        createdAt
        updatedAt
      }
      token {
        accessToken
        refreshToken
        expiresIn
      }
      userErrors {
        code
        message
        field
      }
    }
  }
}
