mutation FacetValueUpdate($input: FacetValueUpdateInput!) {
  catalogMutation {
    facetValueUpdate(input: $input) {
      facetValue {
        id
        slug
        label
        sourceHandles
        sortIndex
        enabled
        swatch {
          id
          swatchType
          colorOne
          colorTwo
        }
        facet {
          id
          slug
        }
      }
      userErrors {
        message
        code
        field
      }
    }
  }
}
