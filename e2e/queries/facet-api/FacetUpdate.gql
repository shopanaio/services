mutation FacetUpdate($input: FacetUpdateInput!) {
  catalogMutation {
    facetUpdate(input: $input) {
      facet {
        id
        facetType
        slug
        label
        uiType
        selectionMode
        lexoRank
        sourceHandles
        group {
          id
          name
        }
        values {
          id
          slug
          label
        }
      }
      userErrors {
        message
        code
        field
      }
    }
  }
}
