query Facets {
  catalogQuery {
    facets {
      id
      facetType
      slug
      label
      uiType
      selectionMode
      sortIndex
      minValues
      maxValuesVisible
      valueSort
      indexable
      sourceHandles
      group {
        id
        name
      }
      values {
        id
        slug
        label
      }
    }
  }
}
