mutation CollectionRemoveProducts($input: CollectionRemoveProductsInput!) {
  catalogMutation {
    collectionRemoveProducts(input: $input) {
      collection {
        id
        handle
        type
        name
        productsCount
        products(first: 20) {
          edges {
            node {
              id
              title
              handle
            }
            cursor
          }
          totalCount
        }
      }
      userErrors {
        message
        code
        field
      }
    }
  }
}
