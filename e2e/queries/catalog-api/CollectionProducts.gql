query CollectionProducts(
  $id: ID!
  $first: Int
  $after: String
  $last: Int
  $before: String
  $sort: ProductSortInput
) {
  catalogQuery {
    collection(id: $id) {
      id
      handle
      type
      name
      defaultSort
      products(
        first: $first
        after: $after
        last: $last
        before: $before
        sort: $sort
      ) {
        edges {
          node {
            id
            title
            handle
            isPublished
            createdAt
          }
          cursor
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
        totalCount
      }
    }
  }
}
