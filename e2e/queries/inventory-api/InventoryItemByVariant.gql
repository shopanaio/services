query InventoryItemByVariant($variantId: ID!) {
  inventoryQuery {
    inventoryItemByVariant(variantId: $variantId) {
      id
      variantId
      sku
      trackInventory
      continueSellingWhenOutOfStock
      totalAvailable
      stock {
        id
        warehouseId
        variantId
        quantityOnHand
        reservedQuantity
        unavailableQuantity
        availableForSale
        warehouse {
          id
          code
        }
        variant {
          id
        }
      }
      unitCost {
        currency
        amountMinor
      }
      dimensions {
        widthMm
        heightMm
        lengthMm
      }
      weight {
        weightGrams
      }
    }
  }
}
