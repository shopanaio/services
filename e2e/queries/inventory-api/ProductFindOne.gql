query ProductFindOne($id: ID!) {
  catalogQuery {
    product(id: $id) {
      id
      handle
      publishedAt
      isPublished
      createdAt
      updatedAt
      deletedAt
      title
      description {
        text
        html
        json
      }
      excerpt {
        text
        html
        json
      }
      seo {
        seoTitle
        seoDescription
        ogTitle
        ogDescription
        ogImage {
          id
          originalName
          url
        }
      }
      media {
        file {
          id
          originalName
        }
        sortIndex
      }
      options {
        id
        name
        slug
        displayType
        values {
          id
          name
          slug
        }
      }
      variantsCount
      variants(first: 10) {
        edges {
          node {
            id
            handle
            isDefault
            inventoryItem {
              id
              sku
              trackInventory
            }
            media {
              file {
                id
              }
              sortIndex
            }
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
        }
        totalCount
      }
    }
  }
}
