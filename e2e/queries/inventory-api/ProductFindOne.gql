query ProductFindOne($id: ID!) {
  catalogQuery {
    product(id: $id) {
      id
      handle
      publishedAt
      isPublished
      createdAt
      updatedAt
      deletedAt
      title
      description {
        text
        html
        json
      }
      excerpt {
        text
        html
        json
      }
      variantsCount
      variants(first: 10) {
        edges {
          node {
            id
            handle
            isDefault
            inventoryItem {
              id
              sku
              trackInventory
            }
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
        }
        totalCount
      }
    }
  }
}
