mutation VariantSetDimensions($input: InventoryItemUpdateInput!) {
  inventoryMutation {
    inventoryItemUpdate(input: $input) {
      inventoryItem {
        id
        dimensions {
          widthMm
          heightMm
          lengthMm
          displayUnit
        }
      }
      userErrors {
        message
        code
      }
    }
  }
}
