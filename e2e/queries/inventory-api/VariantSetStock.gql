mutation VariantSetStock($input: InventoryItemUpdateInput!) {
  inventoryMutation {
    inventoryItemUpdate(input: $input) {
      inventoryItem {
        id
        sku
        trackInventory
        totalAvailable
        stock {
          id
          warehouseId
          variantId
          quantityOnHand
          reservedQuantity
          unavailableQuantity
          availableForSale
          createdAt
          updatedAt
          warehouse {
            id
            code
          }
        }
        weight {
          weightGrams
          displayUnit
        }
        unitCost {
          currency
          amountMinor
        }
      }
      userErrors {
        message
        code
      }
    }
  }
}
