query ProductVariants($id: ID!, $first: Int, $after: String) {
  catalogQuery {
    product(id: $id) {
      id
      variants(first: $first, after: $after) {
        edges {
          cursor
          node {
            id
            handle
          }
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
        totalCount
      }
    }
  }
}
