mutation ProductCreateSimple($input: ProductCreateInput!) {
  inventoryMutation {
    productCreate(input: $input) {
      product {
        id
        title
        handle
        isPublished
        publishedAt
        updatedAt
        revision
        options {
          id
          name
          slug
          displayType
          values {
            id
            name
            slug
          }
        }
        variants(first: 10) {
          edges {
            node {
              id
              isDefault
              handle
              sku
            }
          }
        }
      }
      userErrors {
        message
        code
      }
    }
  }
}
