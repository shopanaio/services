mutation VariantSetPricing($input: VariantUpdatePricingInput!) {
  inventoryMutation {
    variantUpdatePricing(input: $input) {
      variant {
        id
        price {
          id
          currency
          amountMinor
          compareAtMinor
          effectiveFrom
        }
      }
      userErrors {
        message
        code
      }
    }
  }
}
