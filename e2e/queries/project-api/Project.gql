query Project($slug: String!) {
  projectQuery {
    project(slug: $slug) {
      id
      name
      slug
      status
      timezone
      email
      locales
      currencies
      baseCurrency
      defaultLocale
      defaultCurrency
      defaultWeightUnit
      defaultDimensionUnit
      organizationId
      createdAt
      updatedAt
    }
  }
}
