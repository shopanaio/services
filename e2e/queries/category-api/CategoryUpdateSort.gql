mutation CategoryUpdateSort(
  $categoryId: ID!
  $expectedRevision: Int
  $operations: CategoryUpdateInput
) {
  catalogMutation {
    categoryUpdate(
      categoryId: $categoryId
      expectedRevision: $expectedRevision
      operations: $operations
    ) {
      category {
        id
        handle
        revision
        name
        defaultSort
        defaultSortDirection
      }
      operationResults {
        type
        applied
        errors {
          message
          code
          field
        }
      }
      userErrors {
        message
        code
        field
      }
    }
  }
}
