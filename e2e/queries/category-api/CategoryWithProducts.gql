query CategoryWithProducts(
  $id: ID!
  $first: Int
  $after: String
  $last: Int
  $before: String
  $orderBy: [ListingOrderByInput!]
  $where: ListingWhereInput
) {
  catalogQuery {
    category(id: $id) {
      id
      handle
      name
      productsCount
      listing(first: $first, after: $after, last: $last, before: $before, orderBy: $orderBy, where: $where) {
        edges {
          node {
            id
            kind
            isPublished
            title
            handle
          }
          cursor
        }
        pageInfo {
          hasNextPage
          hasPreviousPage
          startCursor
          endCursor
        }
        totalCount
      }
    }
  }
}
