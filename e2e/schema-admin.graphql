type Query {
  appsQuery: AppsQuery!

  """
  Catalog query namespace for product, variant, category, and collection operations
  """
  catalogQuery: CatalogQuery!

  """Widget query namespace for dashboard widgets"""
  widgetQuery: WidgetQuery!

  """
  Inventory query namespace for warehouse, stock, and inventory item operations
  """
  inventoryQuery: InventoryQuery!

  """User management queries."""
  userQuery: UserQuery!

  """Organization queries namespace."""
  organizationQuery: OrganizationQuery!
  mediaQuery: MediaQuery!
  orderQuery: OrderQuery!

  """Store-related queries"""
  storeQuery: StoreQuery!
}

type Mutation {
  appsMutation: AppsMutation!

  """
  Catalog mutation namespace for product, variant, category, and collection operations
  """
  catalogMutation: CatalogMutation!

  """
  Inventory mutation namespace for warehouse, stock, and inventory item operations
  """
  inventoryMutation: InventoryMutation!

  """User management mutations."""
  userMutation: UserMutation!

  """Role management mutations."""
  roleMutation: RoleMutation!

  """Authentication mutations."""
  authMutation: AuthMutation!

  """Organization management mutations."""
  organizationMutation: OrganizationMutation!
  mediaMutation: MediaMutation!
  orderMutation: OrderMutation!

  """Store-related mutations"""
  storeMutation: StoreMutation!
}

scalar JSON

scalar TransportOptions

type App {
  code: String!
  name: String!
  meta: JSON
}

type InstalledApp {
  id: String!
  projectID: String!
  appCode: String!
  domain: String!
  baseURL: String!
  enabled: Boolean!
  meta: JSON
}

type AppsQuery {
  """Get list of available apps for installation"""
  apps: [App!]!

  """Get list of installed apps"""
  installedApps: [InstalledApp!]!
}

type AppsMutation {
  """Install app"""
  install(code: String!): Boolean!

  """Uninstall app"""
  uninstall(code: String!): Boolean!
}

