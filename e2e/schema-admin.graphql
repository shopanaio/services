type CatalogQuery {
  """Get a node by its global ID"""
  node(id: ID!): Node

  """Get multiple nodes by their global IDs"""
  nodes(ids: [ID!]!): [Node]!

  """Get a product by ID"""
  product(id: ID!): Product

  """Get products with Relay-style pagination"""
  products(
    first: Int
    after: String
    last: Int
    before: String

    """Filter conditions"""
    where: ProductWhereInput

    """Sort order"""
    orderBy: [ProductOrderByInput!]

    """Additional query metadata and scope filters"""
    meta: ProductProductsMetaInput
  ): ProductConnection!

  """
  Get a bundle by Product global ID. The product must have kind = BUNDLE.
  """
  bundle(id: ID!): Bundle

  """Get bundles with Relay-style pagination."""
  bundles(first: Int, after: String, last: Int, before: String, where: BundleWhereInput, orderBy: [BundleOrderByInput!], meta: BundleBundlesMetaInput): BundleConnection!

  """Get a variant by ID"""
  variant(id: ID!): Variant

  """Get variants with Relay-style pagination"""
  variants(
    first: Int
    after: String
    last: Int
    before: String

    """Filter conditions"""
    where: VariantWhereInput

    """Sort order"""
    orderBy: [VariantOrderByInput!]
  ): VariantConnection!

  """Get a vendor by ID"""
  vendor(id: ID!): Vendor

  """Get vendors with Relay-style pagination"""
  vendors(
    first: Int
    after: String
    last: Int
    before: String

    """Filter conditions"""
    where: VendorWhereInput

    """Sort order"""
    orderBy: [VendorOrderByInput!]
  ): VendorConnection!

  """Get bulk update job by ID."""
  productBulkUpdateJob(jobId: ID!): ProductBulkUpdateJob

  """
  Get product bulk update jobs for the current store.
  Defaults to active jobs when statusFilter is omitted.
  """
  productBulkUpdateJobs(first: Int, after: String, statusFilter: [BulkUpdateJobStatus!]): ProductBulkUpdateJobConnection!

  """Get a category by ID"""
  category(id: ID!): Category

  """Get a collection by ID"""
  collection(id: ID!): Collection

  """Get a collection by its handle"""
  collectionByHandle(handle: String!): Collection

  """Get collections with Relay-style pagination"""
  collections(first: Int, after: String, last: Int, before: String): CollectionConnection!

  """Preview count of products matching collection rules"""
  collectionRulesPreviewCount(rules: [CollectionRuleInput!]!): Int!

  """Get a facet group by ID"""
  facetGroup(id: ID!): FacetGroup

  """Get all facet groups"""
  facetGroups: [FacetGroup!]!

  """Get a facet by ID"""
  facet(id: ID!): Facet

  """Get all facets"""
  facets: [Facet!]!

  """Get a facet value by ID"""
  facetValue(id: ID!): FacetValue

  """Get all facet values for a specific facet"""
  facetValues(facetId: ID!): [FacetValue!]!

  """Get a facet swatch by ID"""
  facetSwatch(id: ID!): FacetSwatch

  """Get all facet swatches"""
  facetSwatches: [FacetSwatch!]!

  """Get categories with Relay-style pagination"""
  categories(first: Int, after: String, last: Int, before: String, where: CategoryWhereInput, orderBy: [CategoryOrderByInput!], meta: CategoryCategoriesMetaInput): CategoryConnection!

  """Get a tag by ID"""
  tag(id: ID!): Tag

  """Get tags with Relay-style pagination"""
  tags(
    first: Int
    after: String
    last: Int
    before: String

    """Filter conditions"""
    where: TagWhereInput

    """Sort order"""
    orderBy: [TagOrderByInput!]
  ): TagConnection!
}

"""Widget query namespace for dashboard widgets."""
type WidgetQuery {
  """Get pricing widget data for a variant."""
  pricing(input: PricingWidgetInput!): PricingWidgetPayload!

  """
  Get inventory widget data for a product.
  Returns aggregated inventory metrics across all variants.
  """
  inventory(productId: ID!): ProductInventoryWidget
}

type InventoryQuery {
  """Get a node by its global ID"""
  node(id: ID!): Node

  """Get multiple nodes by their global IDs"""
  nodes(ids: [ID!]!): [Node]!

  """Get a warehouse by ID"""
  warehouse(id: ID!): Warehouse

  """Get all warehouses"""
  warehouses(
    first: Int
    after: String
    last: Int
    before: String

    """Filter conditions"""
    where: WarehouseWhereInput

    """Sort order"""
    orderBy: [WarehouseOrderByInput!]
  ): WarehouseConnection!

  """Get an inventory item by ID"""
  inventoryItem(id: ID!): InventoryItem

  """Get an inventory item by variant ID"""
  inventoryItemByVariant(variantId: ID!): InventoryItem

  """Get inventory items with Relay-style pagination"""
  inventoryItems(first: Int, after: String, last: Int, before: String, where: InventoryItemWhereInput, orderBy: [InventoryItemOrderByInput!], meta: InventoryItemInventoryItemsMetaInput): InventoryItemConnection!

  """Get variants that can still be assigned to the selected warehouse"""
  warehouseAssignableVariants(warehouseId: ID!, first: Int, after: String, last: Int, before: String, where: WarehouseAssignableVariantWhereInput, orderBy: [WarehouseAssignableVariantOrderByInput!]): VariantConnection!
}

type InventoryMutation {
  """Update inventory item: stock, SKU, and cost."""
  inventoryItemUpdate(input: InventoryItemUpdateInput!): InventoryItemUpdatePayload!
  warehouseCreate(input: WarehouseCreateInput!): WarehouseCreatePayload!
  warehouseUpdate(input: WarehouseUpdateInput!): WarehouseUpdatePayload!
  warehouseDelete(input: WarehouseDeleteInput!): WarehouseDeletePayload!
  warehouseStockCreate(input: WarehouseStockCreateInput!): WarehouseStockCreatePayload!
  warehouseStockDelete(input: WarehouseStockDeleteInput!): WarehouseStockDeletePayload!
}

type CatalogMutation {
  """Create a new vendor"""
  vendorCreate(input: VendorCreateInput!): VendorCreatePayload!

  """Create a new product"""
  productCreate(input: ProductCreateInput!): ProductCreatePayload!

  """Delete an existing product"""
  productDelete(input: ProductDeleteInput!): ProductDeletePayload!

  """Update product status (active, draft, archived)"""
  productUpdateStatus(input: ProductUpdateStatusInput!): ProductUpdateStatusPayload!

  """
  Unified product update with optimistic locking.
  Supports product and variant updates in a single request.
  """
  productUpdate(
    """The product ID to update."""
    productId: ID!

    """
    Expected revision for optimistic locking. If provided, fails if product was modified.
    """
    expectedRevision: Int

    """Product-level operations."""
    operations: ProductUpdateInput
  ): ProductUpdatePayload!

  """Create a new bundle sellable item."""
  bundleCreate(input: BundleCreateInput!): BundleCreatePayload!

  """Unified bundle update with optimistic locking."""
