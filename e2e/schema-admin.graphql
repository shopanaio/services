type AuthTokenPayload {
  """Access token for API requests."""
  accessToken: String!

  """Refresh token for obtaining new access tokens."""
  refreshToken: String!

  """Expiration time in seconds."""
  expiresIn: Int!
}

type UserQuery {
  """Get current authenticated admin user"""
  current: User

  """
  Check authorization for current user.
  Used for server-side permission checks.
  For client-side checks, use project.roles + user.role.
  """
  authorize(input: AuthorizeInput!): AuthorizePayload!
}

type UserMutation {
  userUpdateProfile(input: UserUpdateProfileInput!): UserUpdateProfilePayload!
  userUpdateEmail(input: UserUpdateEmailInput!): UserUpdateEmailPayload!
  userUpdatePassword(input: UserUpdatePasswordInput!): UserUpdatePasswordPayload!
}

type AuthMutation {
  signUp(input: UserSignUpInput!): UserSignUpPayload!
  signIn(input: UserSignInInput!): UserSignInPayload!
  signOut(input: UserSignOutInput!): UserSignOutPayload!
  tokenRefresh(input: UserTokenRefreshInput!): UserTokenRefreshPayload!
}

"""Role mutations."""
type RoleMutation {
  """
  Create custom role.
  Requires: project:admin permission.
  """
  roleCreate(input: RoleCreateInput!): RoleCreatePayload!

  """
  Update role.
  Requires: project:admin permission.
  System roles cannot be modified.
  """
  roleUpdate(input: RoleUpdateInput!): RoleUpdatePayload!

  """
  Delete custom role.
  Requires: project:admin permission.
  System roles cannot be deleted.
  Roles with assigned users cannot be deleted.
  """
  roleDelete(input: RoleDeleteInput!): RoleDeletePayload!
}

"""
Member with role assignment.
Used for both org-level (domain = "org") and store-level (domain = "store:uuid").
"""
type Member {
  """Unique identifier."""
  id: ID!

  """User reference."""
  user: User!

  """Role name."""
  role: String!

  """
  Whether this member is the organization owner.
  Owner bypasses all authorization checks within the organization.
  Only applicable for org-level membership (domain = "org").
  """
  isOwner: Boolean!

  """When access was granted."""
  grantedAt: DateTime!

  """User who granted access."""
  grantedBy: User
}

"""
Membership — universal container for members and roles.
Used for both Organization and Store.
Domain determines context: orgId for org-level, storeId for store-level.
"""
type Membership {
  """Domain identifier ("org" for organization, or "store:uuid")."""
  domain: String!

  """Organization ID (required for casbin queries)."""
  organizationId: ID!

  """All roles available in this organization."""
  roles: [Role!]!

  """All members with access to this domain."""
  members: [Member!]!

  """Available resources for role editor (org-level only)."""
  availableResources: [ResourceDefinition!]
}

"""
Organization - top level entity for multi-tenancy.
Users belong to organizations, organizations contain stores.
"""
type Organization {
  """Unique identifier."""
  id: ID!

  """URL-friendly unique identifier."""
  name: String!

  """Display name (e.g., "Acme Corp")."""
  displayName: String!

  """Membership info (members + roles). Domain = orgId."""
  membership: Membership!

  """Timestamp when the organization was created."""
  createdAt: DateTime!

  """Timestamp when the organization was last updated."""
  updatedAt: DateTime
}

type OrganizationCreatePayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type OrganizationUpdatePayload {
  organization: Organization
  userErrors: [GenericUserError!]!
}

type OrganizationDeletePayload {
  deletedOrganizationId: ID
  userErrors: [GenericUserError!]!
}

type MemberInvitePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type MemberRemovePayload {
  removedMemberId: ID
  userErrors: [GenericUserError!]!
}

type MemberRoleChangePayload {
  member: Member
  userErrors: [GenericUserError!]!
}

type MemberAccessRemovePayload {
  success: Boolean!
  userErrors: [GenericUserError!]!
}

type OwnershipTransferPayload {
  """Whether the transfer was successful."""
  success: Boolean!
  userErrors: [GenericUserError!]!
}

"""Organization queries."""
type OrganizationQuery {
  """Get organization by ID (if user has access)."""
  organization(id: ID!): Organization
}

"""Organization mutations."""
type OrganizationMutation {
  """
  Create a new organization.
  Current user becomes the owner.
  """
  organizationCreate(input: OrganizationCreateInput!): OrganizationCreatePayload!

  """
  Update organization.
  Requires: org admin or owner.
  """
  organizationUpdate(input: OrganizationUpdateInput!): OrganizationUpdatePayload!

  """Delete organization. Requires: org owner only."""
  organizationDelete(id: ID!): OrganizationDeletePayload!

  """
  Transfer organization ownership to another admin.
  Only the current owner can transfer ownership.
  New owner must have admin role in the organization.
  Previous owner retains admin role.
  """
  ownershipTransfer(input: OwnershipTransferInput!): OwnershipTransferPayload!

  """Invite member to organization with role assignments."""
  memberInvite(input: MemberInviteInput!): MemberInvitePayload!

  """
  Remove member from organization.
  Requires: org admin or owner.
  Cannot remove owner (transfer ownership first).
  """
  memberRemove(input: MemberRemoveInput!): MemberRemovePayload!

  """
  Change role for a member in specific domain.
  Owner cannot be demoted.
  """
  memberRoleChange(input: MemberRoleChangeInput!): MemberRoleChangePayload!

  """Remove member's access from domain."""
  memberAccessRemove(input: MemberAccessRemoveInput!): MemberAccessRemovePayload!
}

"""Role with permissions - universal, can be assigned at any level."""
type Role {
  """Unique identifier."""
  id: ID!

  """
  Domain scope for this role.
  - "org" = organization-level role
  - "store:{uuid}" = store-specific role
  """
  domain: String!

  """Unique role name within organization (e.g.: admin, manager, viewer)."""
  name: String!

  """Human-readable display name."""
  displayName: String!

  """Role description."""
  description: String

  """System role cannot be deleted or modified."""
  isSystem: Boolean!

  """Role permissions."""
  permissions: [RolePermission!]!

  """Role creation date."""
  createdAt: DateTime

  """Role last update date."""
  updatedAt: DateTime
}

"""Role permission - access to resource with specific actions."""
type RolePermission {
  """Resource name (e.g.: org.profile, store.members)."""
  resource: String!

  """Allowed actions (e.g.: create, read, update, delete)."""
  actions: [String!]!
}

"""Resource definition for role editor UI."""
type ResourceDefinition {
  """Resource name (product, order, etc.)."""
  name: String!

  """Available actions for resource."""
  actions: [String!]!

  """Display name."""
  displayName: String
}

type RoleCreatePayload {
  role: Role
  userErrors: [GenericUserError!]!
}

type RoleUpdatePayload {
  role: Role
  userErrors: [GenericUserError!]!
