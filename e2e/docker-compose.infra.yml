services:
  postgres:
    image: postgres:17
    container_name: shopana-e2e-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - ../.tmp/e2e-data/postgres:/var/lib/postgresql/data
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"

  minio:
    image: minio/minio:latest
    container_name: shopana-e2e-minio
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ../.tmp/e2e-data/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    container_name: shopana-e2e-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/catalog --ignore-existing;
      mc anonymous set public myminio/catalog;
      mc mb myminio/media --ignore-existing;
      mc anonymous set public myminio/media;
      mc mb myminio/inventory --ignore-existing;
      mc anonymous set public myminio/inventory;
      echo 'Buckets created';
      exit 0;
      "
    restart: "no"
