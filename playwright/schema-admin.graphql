  """The date and time when the product was created."""
  createdAt: DateTime!

  """The date and time when the product was last updated."""
  updatedAt: DateTime!

  """The date and time when the product was deleted (soft delete)."""
  deletedAt: DateTime

  """The variants of this product."""
  variants(first: Int, after: String, last: Int, before: String): VariantConnection!

  """The options available for this product."""
  options: [ProductOption!]!

  """The features of this product."""
  features: [ProductFeature!]!

  """The total number of variants for this product."""
  variantsCount: Int!

  """Product title."""
  title: String!

  """Product description."""
  description: Description

  """Short excerpt."""
  excerpt: String

  """SEO title."""
  seoTitle: String

  """SEO description."""
  seoDescription: String
}

